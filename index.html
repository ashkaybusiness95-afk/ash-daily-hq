function weekDates(){
  var d = new Date(now), day = d.getDay();
  var mon = new Date(d); mon.setDate(d.getDate() - ((day+6)%7));
  var arr = [];
  for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);arr.push(dd.toISOString().split("T")[0]);}

}

/* ═══ Voice ═══ */
function speakText(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // Strip ALL emoji, symbols, special chars
  var clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, "")
    .replace(/[\u{2600}-\u{27BF}]/gu, "")
    .replace(/[\u{FE00}-\u{FEFF}]/gu, "")
    .replace(/[☀📰📋🏠🥊📷⚠💪🚶📖🚴🏃🥗💧✓✗→←►▶■□●○★☆♦♣♠♥✦✧⬆⬇⬅➡↑↓←→]/g, "")
    .replace(/[^\x20-\x7E\n]/g, " ")
    .replace(/\n{2,}/g, ". ")
    .replace(/\n/g, ". ")
    .replace(/\s{2,}/g, " ")
    .trim();
  var u = new SpeechSynthesisUtterance(clean);
  u.lang = "en-GB";
  u.rate = 0.95;
  u.pitch = 1;
  // Try to pick a British voice
  var voices = window.speechSynthesis.getVoices();
  var brit = voices.find(function(v){return v.lang==="en-GB";});
  if(brit) u.voice = brit;
  window.speechSynthesis.speak(u);
}
