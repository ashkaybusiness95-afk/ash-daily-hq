              return <div key={slot} style={{padding:"8px 6px",borderRadius:10,background:slotTotal>0?sc.bg:"transparent",border:"1px solid "+(slotTotal>0?sc.c+"30":C.bdr),textAlign:"center"}}>
                <div style={{fontSize:9,fontWeight:700,color:slotTotal>0?sc.tx:C.t3,textTransform:"uppercase",letterSpacing:0.5}}>{SLOT_LABEL[slot]}</div>
                <div style={{fontSize:17,fontWeight:700,color:slotTotal>0?sc.tx:C.t3,fontFamily:"'Playfair Display',serif",marginTop:2}}>{slotTotal}<span style={{fontSize:10,fontFamily:"inherit",fontWeight:500}}>g</span></div>
                <div style={{fontSize:9,color:C.t3,marginTop:1}}>{slotMeals.length} {slotMeals.length===1?"item":"items"}</div>
              </div>;
            })}
          </div>
          {(()=>{const beforeDinner=dayMeals.filter(m=>{const s=m.slot||mealSlotFromHour(new Date(m.time||0).getHours());return s==="breakfast"||s==="lunch";}).reduce((a,m)=>a+(m.total||0),0);const backloaded=dayProtein>0&&beforeDinner<dayProtein*0.4&&dayMeals.length>=2;return backloaded?<div style={{fontSize:11,color:C.redTx,marginTop:8,padding:"8px 10px",background:C.redBg,borderRadius:8,lineHeight:1.4}}>Only {Math.round((beforeDinner/dayProtein)*100)}% of protein before dinner. Front-load breakfast/lunch for better muscle retention on a cut.</div>:null;})()}
        </div>
      </div>}

      {dayMeals.length>0&&<div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>{foodDate===TD?"Today's":fmt(foodDate)+" "}meals</div><span style={pl(C.coralBg,C.coralTx)}>{dayMeals.length} logged</span></div>
        {dayMeals.map((m,i)=>{const curSlot=m.slot||mealSlotFromHour(new Date(m.time||0).getHours());const sc=SLOT_COLOR[curSlot];return <div key={m.id} style={{padding:"12px 16px",borderBottom:i<dayMeals.length-1?"1px solid "+C.bdr:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:C.txt,fontWeight:500,marginBottom:4}}>{m.input}</div>
              {m.items&&m.items.length>1&&<div style={{fontSize:11,color:C.t2,marginBottom:4}}>{m.items.map(it=>it.name+" ("+it.protein+"g)").join(" · ")}</div>}
              <div style={{display:"flex",gap:4,marginTop:4}}>
                {SLOT_ORDER.map(s=>{const sc2=SLOT_COLOR[s];const on=s===curSlot;return <button key={s} onClick={()=>setMealSlot(m.id,s)} style={{padding:"2px 8px",borderRadius:99,fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:on?"1.5px solid "+sc2.c:"1px solid "+C.bdr,background:on?sc2.bg:"transparent",color:on?sc2.tx:C.t3}}>{SLOT_LABEL[s]}</button>;})}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:16,fontWeight:700,color:C.coralTx}}>{m.total}g</div>
              <div style={{display:"flex",gap:6,marginTop:4,justifyContent:"flex-end"}}>
                <button onClick={()=>editMeal(m)} style={{fontSize:10,color:C.blu,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0,fontWeight:600}}>Edit</button>
                <button onClick={()=>delMeal(m.id)} style={{fontSize:10,color:C.t3,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>Delete</button>
              </div>
            </div>
          </div>
        </div>;})}
      </div>}

      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Last 7 days</div><span style={pl(C.grnBg,C.grnTx)}>avg {Math.round(protein7d.reduce((a,d)=>a+d.total,0)/7)}g</span></div>
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,alignItems:"end",height:90,marginBottom:8}}>
            {protein7d.map(d=>{const pct=Math.min(100,(d.total/proteinTarget)*100);const hit=d.total>=proteinTarget;
              return <div key={d.date} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end",cursor:"pointer"}} onClick={()=>setFoodDate(d.date)}>
                <div style={{fontSize:9,color:d.total>0?C.txt:C.t3,fontWeight:600}}>{d.total||"—"}</div>
                <div style={{width:"100%",background:hit?C.grn:d.total>0?C.coral:C.bdr,height:d.total>0?Math.max(4,pct*0.65)+"%":4,borderRadius:"6px 6px 0 0",transition:"height 0.3s",opacity:d.date===TD?1:d.date===foodDate?0.9:0.7}}/>
              </div>;
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {protein7d.map(d=><div key={d.date} style={{fontSize:10,color:d.date===TD?C.txt:C.t3,fontWeight:d.date===TD?700:500,textAlign:"center"}}>{d.day}</div>)}
          </div>
        </div>
      </div>
    </div>}

    {/* ══════ REVIEW ══════ */}
    {tab==="review"&&<div className="fade-in">
      {/* END OF DAY REFLECTION */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>End of day</div>
          <span style={pl(dailyScore===dailyTotal?C.grnBg:C.ambBg,dailyScore===dailyTotal?C.grnTx:C.ambTx)}>{dailyScore}/{dailyTotal}</span>
        </div>
        <div style={{padding:14}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
            <div style={{padding:10,borderRadius:10,background:C.grnBg,textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color:C.grnTx}}>{todayDone.length}/{customActs.length}</div>
              <div style={{fontSize:10,color:C.grnTx,fontWeight:600}}>Habits</div>
            </div>
            <div style={{padding:10,borderRadius:10,background:C.bluBg,textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color:C.bluTx}}>{doneTodayC}/{totalTodayC||0}</div>
              <div style={{fontSize:10,color:C.bluTx,fontWeight:600}}>Tasks</div>
            </div>
            <div style={{padding:10,borderRadius:10,background:proteinHitToday?C.grnBg:C.coralBg,textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:700,color:proteinHitToday?C.grnTx:C.coralTx}}>{todayProtein}g</div>
              <div style={{fontSize:10,color:proteinHitToday?C.grnTx:C.coralTx,fontWeight:600}}>Protein</div>
            </div>
          </div>
          <textarea value={reflectIn||reflections[TD]||""} onChange={e=>setReflectIn(e.target.value)} placeholder="One line about today — win, lesson, or anything worth remembering." style={{...inp,minHeight:70,resize:"vertical",fontFamily:"inherit",marginBottom:8}}/>
          <button onClick={()=>{const v=(reflectIn||reflections[TD]||"").trim();upd(d=>{const n={...d.reflections};if(v)n[TD]=v;else delete n[TD];return{reflections:n};});setReflectIn("");}} style={{...btnP(C.grn),width:"100%"}}>Save reflection</button>
          {reflections[TD]&&!reflectIn&&<div style={{fontSize:11,color:C.t3,marginTop:6,textAlign:"center"}}>Saved. Edit above to update.</div>}
        </div>
      </div>

      {/* ═══ PLAN TOMORROW ═══ */}
      <div style={{...card,borderLeft:"4px solid "+C.blu}}>
        <div style={cHead}>
          <div><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Plan tomorrow</div><div style={{fontSize:11,color:C.t2,marginTop:1}}>{fmtFull(TMR)}</div></div>
          {planTmr&&!showPlanTmr&&<button onClick={delTmrPlan} style={{fontSize:11,color:C.t3,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Clear</button>}
        </div>
        {!showPlanTmr&&!planTmr&&<div style={{padding:"16px 16px"}}>
          <div style={{fontSize:12,color:C.t2,marginBottom:10,lineHeight:1.5}}>Lock in your intentions. Pick activities, pin must-do tasks. You'll see it on the Today screen tomorrow morning.</div>
          <button onClick={()=>{setPlanDraft({acts:[],note:""});setShowPlanTmr(true);}} style={{...btnP(C.blu),width:"100%",padding:12,fontSize:14}}>+ Plan tomorrow</button>
        </div>}
        {!showPlanTmr&&planTmr&&<div style={{padding:"12px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.bluTx,marginBottom:6,textTransform:"uppercase",letterSpacing:0.6}}>Set</div>
          {(planTmr.acts||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {planTmr.acts.map(a=>{const st=actStyle(a);return <span key={a} style={pl(st.bg,st.tx)}>{a}</span>;})}
          </div>}
          {planTmr.note&&<div style={{fontSize:12,color:C.t2,fontStyle:"italic",marginBottom:8}}>"{planTmr.note}"</div>}
          {tasks.filter(t=>t.mustDoDate===TMR&&!t.done).length>0&&<div>
            <div style={{fontSize:10,fontWeight:700,color:C.amb,marginBottom:4,textTransform:"uppercase",letterSpacing:0.6}}>Must do</div>
            {tasks.filter(t=>t.mustDoDate===TMR&&!t.done).map(t=><div key={t.id} style={{fontSize:12,color:C.txt,padding:"2px 0"}}>★ {t.text}</div>)}
          </div>}
          <button onClick={()=>{setPlanDraft({acts:planTmr.acts||[],note:planTmr.note||""});setShowPlanTmr(true);}} style={{...btnP(C.bluBg,C.bluTx),marginTop:8,padding:"8px 12px",fontSize:12}}>Edit plan</button>
        </div>}
        {showPlanTmr&&<div style={{padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:6}}>What will you train?</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {customActs.map(a=>{const picked=planDraft.acts.includes(a);const st=actStyle(a);return <button key={a} onClick={()=>setPlanDraft(p=>({...p,acts:picked?p.acts.filter(x=>x!==a):[...p.acts,a]}))} style={{padding:"6px 12px",borderRadius:99,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:picked?"2px solid "+st.color:"1px solid "+C.bdr,background:picked?st.bg:"transparent",color:picked?st.tx:C.t2}}>{picked?"✓ ":""}{a}</button>;})}
          </div>
          <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:6}}>Pin must-do tasks (optional)</div>
          <div style={{marginBottom:10,maxHeight:160,overflowY:"auto"}}>
            {tasks.filter(t=>!t.done&&(t.due===TMR||t.due<=TMR)).slice(0,10).length===0?<div style={{fontSize:11,color:C.t3,padding:"8px 0"}}>No tasks available.</div>:tasks.filter(t=>!t.done&&(t.due===TMR||t.due<=TMR)).slice(0,10).map(t=>{const pinned=t.mustDoDate===TMR;const c=gc(t.cat);return <div key={t.id} onClick={()=>togglePinDate(t.id,TMR)} style={{padding:"8px 10px",display:"flex",gap:8,alignItems:"center",border:"1px solid "+(pinned?C.amb:C.bdr),borderRadius:8,marginBottom:4,cursor:"pointer",background:pinned?C.ambBg:"transparent"}}>
              <span style={{fontSize:14,color:pinned?C.amb:C.t3}}>★</span>
              <div style={{flex:1,fontSize:12,color:C.txt,fontWeight:pinned?600:500}}>{t.text}</div>
              <span style={{...pl(c.bg,c.tx),fontSize:10}}>{c.label}</span>
            </div>;})}
          </div>
          <input value={planDraft.note} onChange={e=>setPlanDraft(p=>({...p,note:e.target.value}))} placeholder="One line of intent (optional) — e.g. 'Hit protein by 3pm'" style={inp}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveTmrPlan} style={{...btnP(C.blu),flex:1,padding:12,fontSize:14}}>Lock in</button>
            <button onClick={()=>setShowPlanTmr(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,color:C.t2}}>Cancel</button>
          </div>
        </div>}
      </div>

      {/* HABIT HEATMAP */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Habit heatmap</div><span style={{fontSize:11,color:C.t3}}>Last 28 days</span></div>
        <div style={{padding:"14px 16px",overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"90px repeat(28,1fr)",gap:2,minWidth:420}}>
            <div></div>
            {Array.from({length:28},(_,i)=>{const d=dateShift(TD,-27+i);const dt=new Date(d);return <div key={d} style={{fontSize:8,color:d===TD?C.txt:C.t3,fontWeight:d===TD?700:500,textAlign:"center",writingMode:"vertical-rl",transform:"rotate(180deg)",height:20,overflow:"hidden"}}>{dt.getDate()}</div>;})}
            {customActs.map(name=>{const st=actStyle(name);return <React.Fragment key={name}>
              <div style={{fontSize:10,color:C.t2,fontWeight:600,display:"flex",alignItems:"center",paddingRight:4,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{name}</div>
              {Array.from({length:28},(_,i)=>{const d=dateShift(TD,-27+i);const done=!!acts[name+"-"+d];const future=d>TD;
                return <div key={d} title={name+" "+d+(done?" ✓":"")} style={{aspectRatio:"1",borderRadius:3,background:future?"transparent":done?st.color:C.bdr,opacity:future?0.1:done?1:0.5,border:d===TD?"1.5px solid "+C.txt:"none"}}/>;
              })}
            </React.Fragment>;})}
          </div>
        </div>
      </div>

      {/* WEEKLY AI */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Weekly AI review</div></div>
        <div style={{padding:14}}>
          <button onClick={genWeeklyAI} disabled={wkAiLoad} style={{width:"100%",padding:14,borderRadius:10,border:"none",cursor:wkAiLoad?"default":"pointer",background:wkAiLoad?C.bdr:C.slate,color:wkAiLoad?C.t3:"#fff",fontSize:14,fontWeight:600,fontFamily:"inherit"}}>{wkAiLoad?"Analysing...":"Generate weekly summary"}</button>
          {wkAi&&<div style={{marginTop:12,padding:14,background:"#fafaf7",borderRadius:10,fontSize:13,lineHeight:1.7,color:C.txt,whiteSpace:"pre-wrap"}}>{wkAi}</div>}
          {!apiKey&&<div style={{fontSize:11,color:C.t3,marginTop:8,textAlign:"center"}}>Needs API key — add via ⚙ in header</div>}
        </div>
      </div>

      {/* PAST REFLECTIONS */}
      {Object.keys(reflections).length>0&&<div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Recent reflections</div></div>
        {Object.entries(reflections).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).filter(([d])=>d!==TD).map(([d,r])=><div key={d} style={{padding:"10px 16px",borderBottom:"1px solid "+C.bdr}}>
          <div style={{fontSize:11,color:C.t2,fontWeight:600,marginBottom:3}}>{fmtFull(d)}</div>
          <div style={{fontSize:13,color:C.txt,lineHeight:1.5}}>{r}</div>
        </div>)}
      </div>}
    </div>}

    </div>

    {/* BOTTOM NAV */}
    <div className="glass" style={{position:"fixed",bottom:0,left:0,right:0,borderTop:"1px solid rgba(232,230,225,0.6)",zIndex:20,paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div style={{maxWidth:640,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(6,1fr)",padding:"6px 4px 8px"}}>
        {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"8px 2px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9.5,fontWeight:600,textAlign:"center",background:"transparent",color:tab===t.k?C.txt:C.t2,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{color:tab===t.k?C.grn:C.t2,display:"flex"}}>{Ico[t.k]}</div>
          {t.l}
        </button>)}
      </div>
    </div>

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
