// ═══ WEIGHT CHART ═══
function WChart({data,ma}){
  if(data.length<2)return null;
  const e=data.slice(0,14).reverse(),w=e.map(x=>x.weight);
  const allVals=[...w];if(ma&&ma.length)ma.forEach(v=>{if(v!=null)allVals.push(v);});
  const mn=Math.min(...allVals),mx=Math.max(...allVals),rng=mx-mn||1;
  const W=320,H=120,px=24,py=20,iw=(W-px*2)/(e.length-1);
  const pts=e.map((x,i)=>({x:px+i*iw,y:py+(1-(x.weight-mn)/rng)*(H-py*2),w:x.weight,d:x.date}));
  const line=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  const area=line+" L"+pts[pts.length-1].x+","+(H-py)+" L"+pts[0].x+","+(H-py)+" Z";
  const maPts=ma&&ma.length?ma.map((v,i)=>v==null?null:{x:px+i*iw,y:py+(1-(v-mn)/rng)*(H-py*2)}).filter(Boolean):[];
  const maLine=maPts.length>1?maPts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" "):"";
  return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",display:"block"}}>
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.grn} stopOpacity="0.12"/><stop offset="100%" stopColor={C.grn} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#wg)"/>
    <path d={line} fill="none" stroke={C.grn} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {maLine&&<path d={maLine} fill="none" stroke={C.slate} strokeWidth="1.5" strokeDasharray="4 3" strokeLinecap="round"/>}
    {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r={i===pts.length-1?4:2.5} fill={i===pts.length-1?C.grn:"#fff"} stroke={C.grn} strokeWidth="2"/>
    {(i===0||i===pts.length-1||i%3===0)&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={C.t2} fontWeight="500">{p.w}</text>}
    {(i===0||i===pts.length-1||i%3===0)&&<text x={p.x} y={H-4} textAnchor="middle" fontSize="8" fill={C.t3}>{fmt(p.d)}</text>}</g>)}
  </svg>;
}

  // ─── STEPS ───
  const getSteps=d=>steps[d||actDate]||0;
  const setSteps=(d,v)=>upd(p=>{const n={...p.steps};const val=parseInt(v)||0;if(val>0)n[d]=val;else delete n[d];return{steps:n};});

  // ─── PROTEIN ───
  const latestWeight=body.length>0?body[0].weight:86.5;
  const proteinTarget=Math.round(latestWeight*1.8);
  const dayMeals=(meals||[]).filter(m=>m.date===foodDate);
  const dayProtein=dayMeals.reduce((a,m)=>a+(m.total||0),0);
  const todayProtein=(meals||[]).filter(m=>m.date===TD).reduce((a,m)=>a+(m.total||0),0);
  const proteinHitToday=todayProtein>=proteinTarget;
  const dayProteinPct=Math.min(100,Math.round((dayProtein/proteinTarget)*100));
  const proteinDeficit=Math.max(0,proteinTarget-dayProtein);

  const mealSlotFromHour=h=>h<11?"breakfast":h<15?"lunch":h<19?"dinner":"snack";
  const SLOT_ORDER=["breakfast","lunch","dinner","snack"];
  const SLOT_LABEL={breakfast:"Breakfast",lunch:"Lunch",dinner:"Dinner",snack:"Snacks"};
  const SLOT_COLOR={breakfast:{bg:C.ambBg,tx:C.ambTx,c:C.amb},lunch:{bg:C.grnBg,tx:C.grnTx,c:C.grn},dinner:{bg:C.purpBg,tx:C.purpTx,c:C.purp},snack:{bg:C.bluBg,tx:C.bluTx,c:C.blu}};
  const setMealSlot=(id,slot)=>upd(d=>({meals:(d.meals||[]).map(m=>m.id===id?{...m,slot}:m)}));
  const parseMeal=(input)=>{
    if(!apiKey){setMealErr("Add your API key (⚙ top right).");return;}
    if(!input.trim())return;
    setMealLoad(true);setMealErr("");
    callAI(apiKey,
      "You are a nutrition parser. Given a free-text food entry, return ONLY a valid JSON object: {\"items\":[{\"name\":\"item\",\"protein\":24}],\"total\":24}. Protein in grams, rounded. Standard USDA values. Assume cooked weight unless specified. No markdown, no code fences — only JSON.",
      input,
      txt=>{
        setMealLoad(false);
        try{
          const clean=txt.replace(/```json|```/g,"").trim();
          const obj=JSON.parse(clean);
          if(!obj.items||!Array.isArray(obj.items))throw new Error("bad");
          obj.total=obj.items.reduce((a,it)=>a+(it.protein||0),0);
          setMealDraft({input,...obj});
        }catch(e){setMealErr("Couldn't parse. Try clearer wording.");}
      });
  };
  const saveMeal=()=>{
    if(!mealDraft)return;
    if(mealDraft._editingId){
      upd(d=>({meals:(d.meals||[]).map(m=>m.id===mealDraft._editingId?{...m,input:mealDraft.input,items:mealDraft.items,total:mealDraft.total}:m)}));
    }else{
      upd(d=>({meals:[{id:uid(),date:foodDate,input:mealDraft.input,items:mealDraft.items,total:mealDraft.total,time:new Date().toISOString(),slot:mealSlotFromHour(now.getHours())},...(d.meals||[])]}));
    }
    setMealDraft(null);setMealIn("");setMealErr("");
  };
  const editMeal=m=>{setMealDraft({input:m.input,items:m.items||[],total:m.total,_editingId:m.id});setMealErr("");window.scrollTo({top:0,behavior:"smooth"});};
  const quickAdd=(food)=>{
    upd(d=>({meals:[{id:uid(),date:foodDate,input:food.name,items:[{name:food.name,protein:food.protein}],total:food.protein,time:new Date().toISOString(),slot:mealSlotFromHour(now.getHours())},...(d.meals||[])]}));
  };
  const delMeal=id=>upd(d=>({meals:(d.meals||[]).filter(m=>m.id!==id)}));
  const updMealItem=(idx,newP)=>{if(!mealDraft)return;const items=mealDraft.items.map((it,i)=>i===idx?{...it,protein:parseInt(newP)||0}:it);const total=items.reduce((a,it)=>a+(it.protein||0),0);setMealDraft({...mealDraft,items,total});};
  const protein7d=Array.from({length:7},(_,i)=>{const d=dateShift(TD,-6+i);const ms=(meals||[]).filter(m=>m.date===d);return{date:d,day:DS[new Date(d).getDay()],total:ms.reduce((a,m)=>a+(m.total||0),0)};});
  const suggested=foods.filter(f=>f.protein<=proteinDeficit+15).sort((a,b)=>Math.abs(a.protein-proteinDeficit)-Math.abs(b.protein-proteinDeficit)).slice(0,4);

  // ─── TASKS ───
  const todayTs=tasks.filter(t=>t.due===TD&&!t.done);
  const overdueTs=tasks.filter(t=>t.due<TD&&!t.done);
  const overdueC=overdueTs.length;
  const doneTodayC=tasks.filter(t=>t.done&&t.due===TD).length;
  const totalTodayC=tasks.filter(t=>t.due===TD).length;
  const subAsTasks=[];
  projects.forEach(p=>{if(p.status==="done"||p.status==="on-hold")return;(p.subtasks||[]).forEach(st=>{if(!st.done)subAsTasks.push({...st,_pid:p.id,_pt:p.title,_isSub:true});});});
  const allToday=[...overdueTs,...todayTs,...subAsTasks];

  const doAddT=()=>{if(!tf.text.trim())return;upd(d=>({tasks:[{id:uid(),text:tf.text.trim(),cat:tf.cat,due:tf.due,pri:tf.pri,done:false,created:TD,recur:tf.recur||""},...d.tasks]}));setTf({text:"",cat:"property",due:TD,pri:"normal",recur:""});setAddT(false);};
  const tglDone=id=>{upd(d=>{
    const t=d.tasks.find(x=>x.id===id);const isCompleting=t&&!t.done;
    let newTasks=d.tasks.map(x=>x.id===id?{...x,done:!x.done}:x);
    if(isCompleting&&t.recur){let nd=nextRecur(t.due,t.recur);while(nd<TD)nd=nextRecur(nd,t.recur);
      const exists=newTasks.some(x=>x.text===t.text&&x.cat===t.cat&&x.due===nd&&!x.done);
      if(!exists)newTasks=newTasks.concat([{id:uid(),text:t.text,cat:t.cat,due:nd,pri:t.pri,done:false,created:TD,recur:t.recur}]);}
    return{tasks:newTasks};
  });};
  const delT=id=>upd(d=>({tasks:d.tasks.filter(t=>t.id!==id)}));
  const saveEdit=id=>{if(!editF.text?.trim())return;upd(d=>({tasks:d.tasks.map(t=>t.id===id?{...t,...editF}:t)}));setEditId(null);};
  const gc=k=>CATS.find(c=>c.key===k)||CATS[0];

  // ─── PIN / MUST-DO ───
  const togglePin=id=>upd(d=>({tasks:d.tasks.map(t=>t.id===id?{...t,mustDoDate:t.mustDoDate===TD?null:TD}:t)}));
  const togglePinDate=(id,date)=>upd(d=>({tasks:d.tasks.map(t=>t.id===id?{...t,mustDoDate:t.mustDoDate===date?null:date}:t)}));
  const togglePinSub=(pid,sid,date)=>upd(d=>({projects:d.projects.map(p=>p.id===pid?{...p,subtasks:p.subtasks.map(st=>st.id===sid?{...st,mustDoDate:st.mustDoDate===(date||TD)?null:(date||TD)}:st)}:p)}));
  const mustDoToday=tasks.filter(t=>!t.done&&t.mustDoDate===TD);
  const mustDoSubs=[];projects.forEach(p=>{if(p.status==="done")return;(p.subtasks||[]).forEach(st=>{if(!st.done&&st.mustDoDate===TD)mustDoSubs.push({...st,_pid:p.id,_pt:p.title});});});
  const mustDoAll=[...mustDoToday,...mustDoSubs];

  // ─── REST DAY ───
  const isRest=d=>!!restDays[d||actDate];
  const toggleRest=d=>upd(p=>{const n={...p.restDays};const k=d||actDate;n[k]?delete n[k]:n[k]=true;return{restDays:n};});

  // ─── PLANS ───
  const TMR=dateShift(TD,1);
  const planToday=plans[TD];
  const planTmr=plans[TMR];
  const saveTmrPlan=()=>{upd(d=>({plans:{...d.plans,[TMR]:{acts:planDraft.acts,note:planDraft.note||""}}}));setShowPlanTmr(false);};
  const delTmrPlan=()=>upd(d=>{const n={...d.plans};delete n[TMR];return{plans:n};});

  // ─── FOODS MGR ───
  const addFood=()=>{if(!newFoodN.trim()||!newFoodP)return;upd(d=>({foods:[...(d.foods||[]),{name:newFoodN.trim(),protein:parseInt(newFoodP)||0}]}));setNewFoodN("");setNewFoodP("");};
  const delFood=i=>upd(d=>({foods:d.foods.filter((_,x)=>x!==i)}));
  const updFood=(i,patch)=>upd(d=>({foods:d.foods.map((f,x)=>x===i?{...f,...patch}:f)}));
  const filtT=tasks.filter(t=>{if(vm==="today")return(t.due===TD||t.due<TD)&&!t.done;if(vm==="upcoming")return t.due>TD&&!t.done;if(vm==="overdue")return t.due<TD&&!t.done;if(vm==="done")return t.done;return true;}).filter(t=>flt==="all"||t.cat===flt);

  // ─── PROJECTS ───
  const doAddP=()=>{if(!pf.title.trim())return;upd(d=>({projects:[...d.projects,{id:uid(),title:pf.title.trim(),deadline:pf.deadline,notes:pf.notes,status:"active",subtasks:[],created:TD}]}));setPf({title:"",deadline:"",notes:""});setAddP(false);};
  const updP=(id,patch)=>upd(d=>({projects:d.projects.map(p=>p.id===id?{...p,...patch}:p)}));
  const delP=id=>upd(d=>({projects:d.projects.filter(p=>p.id!==id)}));
  const doAddSub=pid=>{if(!subF.text.trim())return;upd(d=>({projects:d.projects.map(p=>p.id===pid?{...p,subtasks:[...p.subtasks,{id:uid(),text:subF.text.trim(),due:subF.due||"",done:false}]}:p)}));setSubF({text:"",due:""});setAddSub(null);};
  const tglSub=(pid,sid)=>upd(d=>({projects:d.projects.map(p=>p.id===pid?{...p,subtasks:p.subtasks.map(st=>st.id===sid?{...st,done:!st.done}:st)}:p)}));
  const delSub=(pid,sid)=>upd(d=>({projects:d.projects.map(p=>p.id===pid?{...p,subtasks:p.subtasks.filter(st=>st.id!==sid)}:p)}));
  const activeP=projects.filter(p=>p.status==="active");

  // ─── GOALS ───
  const doAddG=()=>{if(!gf.text.trim())return;upd(d=>({goals:[...d.goals,{id:uid(),text:gf.text.trim(),deadline:gf.deadline,status:"In progress",created:TD}]}));setGf({text:"",deadline:""});setAddG(false);};
  const updG=(id,patch)=>upd(d=>({goals:d.goals.map(g=>g.id===id?{...g,...patch}:g)}));
  const delG=id=>upd(d=>({goals:d.goals.filter(g=>g.id!==id)}));

  // ─── BODY ───
  const doAddB=()=>{if(!bw)return;upd(d=>({body:[{id:uid(),weight:parseFloat(bw),waist:bwaist?parseFloat(bwaist):null,date:TD},...d.body]}));setBw("");setBwaist("");setAddB(false);};



  // 7-day moving avg + ETA (plain function, not useMemo — avoids hooks order issue with early return)
  const computeTrend=()=>{
    if(body.length<2)return{ma:[],slope:0};
    const sorted=[...body].sort((a,b)=>a.date.localeCompare(b.date));
    const chartW=sorted.slice(-14);
    const chartMa=chartW.map((_,i,arr)=>{const slice=arr.slice(Math.max(0,i-6),i+1);return slice.reduce((a,x)=>a+x.weight,0)/slice.length;});
    const recent=sorted.slice(-8);
    if(recent.length<2)return{ma:chartMa,slope:0};
    const x0=new Date(recent[0].date).getTime();
    const xs=recent.map(r=>(new Date(r.date).getTime()-x0)/864e5);
    const ys=recent.map(r=>r.weight);
    const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
    const sxy=xs.reduce((a,x,i)=>a+x*ys[i],0),sxx=xs.reduce((a,x)=>a+x*x,0);
    const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx)||0;
    return{ma:chartMa,slope};
  };
  const weightTrend=computeTrend();

  const TARGET_W=80;
  const etaDays=weightTrend.slope<-0.01?Math.round((latestWeight-TARGET_W)/(-weightTrend.slope)):null;
  const etaText=etaDays&&etaDays>0&&etaDays<9999?Math.round(etaDays/7)+" wks to "+TARGET_W+"kg":weightTrend.slope>=-0.01&&latestWeight>TARGET_W?"Not trending down":latestWeight<=TARGET_W?"At/under target":null;

  // ─── TWO-WEEK DATA ───
  const twData=TW.map(d=>{const dt=new Date(d);return{date:d,day:DS[dt.getDay()],num:dt.getDate(),
    done:customActs.filter(a=>!!(acts[a+"-"+d])),
    missed:customActs.filter(a=>!acts[a+"-"+d]),
    notes:customActs.reduce((o,a)=>{const n=actNotes[a+"-"+d];if(n)o[a]=n;return o;},{}),
    genNote:notes[d]||"",today:d===TD,future:d>TD,isThisWeek:d>=thisWeekStart};});
  const wkD=twData.filter(d=>d.isThisWeek);
  const wkDaysActive=wkD.filter(d=>!d.future&&!restDays[d.date]);
  const wkDone=wkDaysActive.reduce((a,d)=>a+d.done.length,0);
  const wkPoss=customActs.length*wkDaysActive.length;
  const wkRate=wkPoss>0?Math.round((wkDone/wkPoss)*100):0;

  // ─── DAILY SCORE (simple X/Y) ───
  const dailyScore=todayDone.length+doneTodayC+(proteinHitToday?1:0);
  const dailyTotal=customActs.length+totalTodayC+1;

  // ─── MOMENTUM: streak + weekly best (no XP gimmicks) ───
  // Count consecutive past days with score ≥ 50% (not including today, not including rest days)
  const getScoreForDate=d=>{
    const dayActs=customActs.filter(a=>!!acts[a+"-"+d]).length;
    const dayTasks=tasks.filter(t=>t.done&&t.due===d).length;
    const dayTaskTotal=tasks.filter(t=>t.due===d).length;
    const dayProt=(meals||[]).filter(m=>m.date===d).reduce((a,m)=>a+(m.total||0),0);
    const hit=dayProt>=proteinTarget*0.9?1:0;
    const total=customActs.length+dayTaskTotal+1;
    const score=dayActs+dayTasks+hit;
    return total>0?score/total:0;
  };
  let activeStreak=0;
  for(let i=1;i<=60;i++){const d=dateShift(TD,-i);if(restDays[d]){continue;}if(getScoreForDate(d)>=0.5)activeStreak++;else break;}
  // Best week % in last 12 weeks
  let bestWeekPct=0,bestWeekStart="";
  for(let w=0;w<12;w++){const ws=dateShift(thisWeekStart,-7*w);let done=0,poss=0;for(let dd=0;dd<7;dd++){const d=dateShift(ws,dd);if(d>TD||restDays[d])continue;done+=customActs.filter(a=>!!acts[a+"-"+d]).length;poss+=customActs.length;}if(poss>0){const pct=Math.round((done/poss)*100);if(pct>bestWeekPct){bestWeekPct=pct;bestWeekStart=ws;}}}
  const beatingBest=wkRate>bestWeekPct;

  // ─── AI ───
  const genWeeklyAI=()=>{
    if(!apiKey){setWkAi("Add API key first.");return;}
    setWkAiLoad(true);
    const wkMeals=(meals||[]).filter(m=>m.date>=thisWeekStart);
    const avgProtein=Math.round(wkMeals.reduce((a,m)=>a+(m.total||0),0)/Math.max(1,wkD.filter(d=>!d.future).length));
    const wkSteps=Object.entries(steps).filter(([d])=>d>=thisWeekStart&&d<=TD).reduce((a,[,v])=>a+v,0);
    const reflects=Object.entries(reflections).filter(([d])=>d>=thisWeekStart).map(([d,r])=>DS[new Date(d).getDay()]+": "+r).join(" | ");
    callAI(apiKey,"Coach for Ash: boxing, weights, cycling, cutting fat, property investor. Direct, no fluff, no emoji.",
      "Week: "+thisWeekStart+" to "+TD+"\nActivity: "+wkRate+"% ("+wkDone+"/"+wkPoss+")\nPer day: "+wkD.filter(d=>!d.future).map(d=>d.day+": "+(d.done.join(",")||"rest")).join(" | ")+"\nWeight: "+(body[0]?body[0].weight+"kg, slope "+weightTrend.slope.toFixed(3)+"kg/day":"n/a")+"\nAvg protein: "+avgProtein+"g (target "+proteinTarget+"g)\nSteps total: "+wkSteps+"\nReflections: "+(reflects||"none")+"\n\nGive: 1) what went well 2) what slipped 3) one change for next week. Under 180 words.",
      txt=>{setWkAi(txt);setWkAiLoad(false);upd(d=>({weeklyReviews:{...d.weeklyReviews,[thisWeekStart]:{text:txt,generated:TD}}}));});
  };

  // ─── EXPORT / IMPORT ───
  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download="daily-hq-"+TD+".json";a.click();URL.revokeObjectURL(url);
  };
  const exportCSV=()=>{
    const rows=[["date","day","weight_kg","waist_cm","protein_g","steps","activities_done","reflection"]];
    const allDates=[...new Set([...body.map(b=>b.date),...Object.keys(steps),...Object.keys(reflections),...(meals||[]).map(m=>m.date)])].sort();
    allDates.forEach(d=>{
      const b=body.find(x=>x.date===d);
      const p=(meals||[]).filter(m=>m.date===d).reduce((a,m)=>a+(m.total||0),0);
      const done=customActs.filter(a=>acts[a+"-"+d]).join("; ");
      rows.push([d,DS[new Date(d).getDay()],b?b.weight:"",b&&b.waist?b.waist:"",p||"",steps[d]||"",done,(reflections[d]||"").replace(/"/g,'""')]);
    });
    const csv=rows.map(r=>r.map(c=>'"'+c+'"').join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="daily-hq-"+TD+".csv";a.click();URL.revokeObjectURL(url);
  };
  const importJSON=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const obj=JSON.parse(ev.target.result);
        if(!obj||typeof obj!=="object"){alert("Invalid file");return;}
        if(!confirm("Replace all current data with imported file? This can't be undone."))return;
        ["tasks","projects","goals","body","meals"].forEach(k=>{if(!obj[k])obj[k]=[];});
        ["acts","actNotes","notes","steps","reflections"].forEach(k=>{if(!obj[k])obj[k]={};});
        if(!obj.foods||!obj.foods.length)obj.foods=DEFAULT_FOODS;
        if(!obj.customActs||!obj.customActs.length)obj.customActs=DEFAULT_ACTS.map(a=>a.name);
        setData(obj);
      }catch{alert("Couldn't read file");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // ═══ RENDER ═══
  return <div style={{maxWidth:640,margin:"0 auto",minHeight:"100vh",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>

    {/* STICKY GLASS HEADER */}
    <div className="glass" style={{position:"sticky",top:0,zIndex:20,padding:"20px 16px 14px",borderBottom:"1px solid rgba(232,230,225,0.6)"}}>
      <p style={{fontSize:10,color:C.t2,fontWeight:600,letterSpacing:1.4,textTransform:"uppercase",margin:0}}>{DAYS[now.getDay()].toUpperCase()} {DN} {MO[MI].toUpperCase()}</p>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:2}}>
        <h1 style={{fontSize:26,fontFamily:"'Playfair Display',serif",fontWeight:500,margin:0,color:C.txt,lineHeight:1.1}}>{grW}, Ash</h1>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {overdueC>0&&<span style={{...pl(C.red,"#fff"),fontSize:11,padding:"4px 10px"}}>{overdueC} overdue</span>}
          <span style={pl(dailyScore===dailyTotal?C.grnBg:C.ambBg,dailyScore===dailyTotal?C.grnTx:C.ambTx)}>{dailyScore}/{dailyTotal}</span>
          <button onClick={()=>setShowSettings(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:C.t2,display:"flex"}}>{Ico.gear}</button>
        </div>
      </div>
    </div>

    <div style={{padding:"14px 16px 0"}}>

    {showSettings&&<div style={{...card,padding:14,background:"#fafaf7"}} className="fade-in">
      <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:10}}>Settings</div>
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
        <span style={{color:C.amb,display:"flex"}}>{Ico.key}</span>
        <input value={keyIn} onChange={e=>setKeyIn(e.target.value)} type="password" placeholder={apiKey?"API key saved":"sk-ant-..."} style={{...inp,marginBottom:0,flex:1}}/>
        <button onClick={()=>{if(keyIn.trim()){localStorage.setItem("ash-hq-key",keyIn.trim());setApiKey(keyIn.trim());setKeyIn("");}}} style={btnP(C.grn)}>Save</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
        <button onClick={exportJSON} style={btnP(C.slate)}>Export JSON</button>
        <button onClick={exportCSV} style={btnP(C.slate)}>Export CSV</button>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={btnP(C.amb)}>Import JSON</button>
      </div>
      <input ref={fileRef} type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
      <div style={{fontSize:10,color:C.t3,marginTop:4,marginBottom:14}}>Data auto-backs up to this device. Import replaces all data.</div>

      <div style={{borderTop:"1px solid "+C.bdr,paddingTop:12}}>
        <button onClick={()=>setShowFoodMgr(s=>!s)} style={{width:"100%",textAlign:"left",padding:"8px 0",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,color:C.txt,display:"flex",justifyContent:"space-between"}}>
          <span>Manage quick-add foods ({foods.length})</span>
          <span style={{color:C.t2}}>{showFoodMgr?"−":"+"}</span>
        </button>
        {showFoodMgr&&<div style={{marginTop:10}}>
          {foods.map((f,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",padding:"6px 0",borderBottom:i<foods.length-1?"1px solid "+C.bdr:"none"}}>
            <input value={f.name} onChange={e=>updFood(i,{name:e.target.value})} style={{...inp,flex:1,marginBottom:0,fontSize:12,padding:"6px 10px"}}/>
            <input type="number" value={f.protein} onChange={e=>updFood(i,{protein:parseInt(e.target.value)||0})} style={{...inp,width:60,marginBottom:0,fontSize:12,padding:"6px 10px",textAlign:"right"}}/>
            <span style={{fontSize:11,color:C.t2}}>g</span>
            <button onClick={()=>delFood(i)} style={{width:24,height:24,borderRadius:6,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.trash}</button>
          </div>)}
          <div style={{display:"flex",gap:6,marginTop:10,paddingTop:8,borderTop:"1px solid "+C.bdr}}>
            <input value={newFoodN} onChange={e=>setNewFoodN(e.target.value)} placeholder="New food (e.g. Costa chicken wrap)" style={{...inp,flex:1,marginBottom:0,fontSize:12}}/>
            <input type="number" value={newFoodP} onChange={e=>setNewFoodP(e.target.value)} placeholder="g" style={{...inp,width:60,marginBottom:0,fontSize:12,textAlign:"right"}}/>
            <button onClick={addFood} style={btnP(C.coral)}>Add</button>
          </div>
        </div>}
      </div>
    </div>}

    {/* ══════ TODAY ══════ */}
    {tab==="today"&&<div className="fade-in">

      {/* ═══ HERO BLOCK — MUST DO + PLANNED ═══ */}
      {(mustDoAll.length>0||(planToday&&(planToday.acts||[]).length>0)||activeStreak>=2)&&<div style={{...card,borderTop:"4px solid "+C.grn,background:"linear-gradient(180deg,#fcfbf8 0%,"+C.card+" 100%)",marginBottom:14}}>
        <div style={{padding:"16px 16px 8px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:1.4,color:C.grn,textTransform:"uppercase"}}>Today's focus</div>
              <div style={{fontSize:22,fontFamily:"'Playfair Display',serif",fontWeight:600,color:C.txt,marginTop:2,lineHeight:1.1}}>{dailyScore}<span style={{color:C.t3,fontSize:18}}>/{dailyTotal}</span> <span style={{fontSize:14,color:C.t2,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>done so far</span></div>
            </div>
          </div>

          {/* MOMENTUM STRIP */}
          {(activeStreak>=2||bestWeekPct>0)&&<div style={{display:"grid",gridTemplateColumns:activeStreak>=2&&bestWeekPct>0?"1fr 1fr":"1fr",gap:8,marginBottom:12}}>
            {activeStreak>=2&&<div style={{padding:"8px 10px",borderRadius:10,background:C.grnBg,border:"1px solid "+C.grn+"30"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.grnTx,textTransform:"uppercase",letterSpacing:0.6}}>Active streak</div>
              <div style={{fontSize:18,fontWeight:700,color:C.grnTx,display:"flex",alignItems:"center",gap:4,marginTop:2}}>{activeStreak} {Ico.flame}<span style={{fontSize:11,color:C.t2,fontWeight:500,marginLeft:2}}>days</span></div>
            </div>}
            {bestWeekPct>0&&<div style={{padding:"8px 10px",borderRadius:10,background:beatingBest?C.grnBg:C.ambBg,border:"1px solid "+(beatingBest?C.grn:C.amb)+"30"}}>
              <div style={{fontSize:9,fontWeight:700,color:beatingBest?C.grnTx:C.ambTx,textTransform:"uppercase",letterSpacing:0.6}}>{beatingBest?"New best pace":"Best week: "+bestWeekPct+"%"}</div>
              <div style={{fontSize:18,fontWeight:700,color:beatingBest?C.grnTx:C.ambTx,marginTop:2}}>{wkRate}%<span style={{fontSize:11,color:C.t2,fontWeight:500,marginLeft:4}}>this wk{!beatingBest&&bestWeekPct>wkRate?" · "+(bestWeekPct-wkRate)+" to beat":""}</span></div>
            </div>}
          </div>}

          {mustDoAll.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:6,textTransform:"uppercase",letterSpacing:0.6}}>Must do ({mustDoAll.length})</div>
            {mustDoAll.map((t,i)=>{const isSub=!!t._isSub||!!t._pid;const c=!isSub?gc(t.cat):null;return <div key={t.id+(isSub?"s":"")} style={{padding:"10px 12px",display:"flex",gap:10,alignItems:"center",background:C.card,border:"1.5px solid "+C.red+"30",borderRadius:10,marginBottom:i<mustDoAll.length-1?6:0}}>
              <button onClick={()=>{if(isSub)tglSub(t._pid,t.id);else tglDone(t.id);}} style={{width:22,height:22,borderRadius:7,flexShrink:0,border:"2px solid "+C.red,background:"transparent",cursor:"pointer"}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{t.text}</div>
                {isSub&&<div style={{fontSize:10,color:C.vio,marginTop:2}}>{t._pt}</div>}
              </div>
              <button onClick={()=>{if(isSub)togglePinSub(t._pid,t.id,TD);else togglePin(t.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.amb,padding:4}} title="Unpin">★</button>
            </div>;})}
          </div>}
          {planToday&&(planToday.acts||[]).length>0&&<div style={{padding:"10px 12px",background:C.bluBg,borderRadius:10,marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:0.6,color:C.bluTx,marginBottom:4,textTransform:"uppercase"}}>Planned last night</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {planToday.acts.map(a=>{const st=actStyle(a);const done=isA(a,TD);return <span key={a} style={{fontSize:12,padding:"3px 10px",borderRadius:99,background:done?st.bg:C.card,color:done?st.tx:C.bluTx,border:"1px solid "+(done?st.color:C.bluTx+"30"),fontWeight:600,textDecoration:done?"line-through":"none"}}>{done?"✓ ":""}{a}</span>;})}
            </div>
            {planToday.note&&<div style={{fontSize:11,color:C.bluTx,marginTop:6,lineHeight:1.4}}>"{planToday.note}"</div>}
          </div>}
        </div>
      </div>}

      {/* ═══ END HERO ═══ */}

      {/* ═══ QUICK-LOG BAR — one-tap from home ═══ */}
      <div style={{...card,background:"#fafaf7"}}>
        <div style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t2,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Quick log</div>
          {/* Habits row */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
            {customActs.map(name=>{const done=isA(name,TD);const st=actStyle(name);return <button key={name} onClick={()=>tgl(name,TD)} style={{padding:"6px 10px",borderRadius:99,fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer",border:done?"none":"1px solid "+C.bdr,background:done?st.color:C.card,color:done?"#fff":C.t2,display:"flex",alignItems:"center",gap:4}}>{done?"✓ ":""}{name}</button>;})}
          </div>
          {/* Protein row */}
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:C.coralTx,fontWeight:700,marginRight:2}}>{todayProtein}/{proteinTarget}g</span>
            {foods.slice(0,5).map((f,i)=><button key={i} onClick={()=>{upd(d=>({meals:[{id:uid(),date:TD,input:f.name,items:[{name:f.name,protein:f.protein}],total:f.protein,time:new Date().toISOString(),slot:mealSlotFromHour(now.getHours())},...(d.meals||[])]}));}} style={{padding:"5px 9px",borderRadius:99,fontFamily:"inherit",fontSize:10,fontWeight:600,cursor:"pointer",border:"1px solid "+C.bdr,background:C.card,color:C.coralTx,display:"flex",alignItems:"center",gap:3}}>+{f.protein}g <span style={{color:C.t3,fontWeight:500}}>{f.name.length>12?f.name.slice(0,12)+"…":f.name}</span></button>)}
            <button onClick={()=>setTab("food")} style={{padding:"5px 10px",borderRadius:99,fontFamily:"inherit",fontSize:10,fontWeight:600,cursor:"pointer",border:"1px dashed "+C.bdr,background:"transparent",color:C.t2}}>more →</button>
          </div>
        </div>
      </div>

      {/* ═══ OVERDUE WARNING ═══ */}
      {tasks.filter(t=>!t.done&&t.due<dateShift(TD,-2)).length>0&&<div style={{...card,background:C.redBg,border:"1px solid "+C.red+"40",padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:C.redTx,textTransform:"uppercase",letterSpacing:0.6}}>Old overdue tasks piling up</div>
          <div style={{fontSize:12,color:C.redTx,marginTop:2}}>{tasks.filter(t=>!t.done&&t.due<dateShift(TD,-2)).length} tasks overdue 3+ days. Decide: do, reschedule, or delete.</div>
        </div>
        <button onClick={()=>{setTab("tasks");setVm("overdue");}} style={{padding:"8px 12px",borderRadius:8,border:"none",background:C.red,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Review</button>
      </div>}

      {/* ═══ SATURDAY WEIGH-IN NUDGE ═══ */}
      {now.getDay()===6&&now.getHours()<14&&(!body[0]||body[0].date<dateShift(TD,-4))&&<div style={{...card,background:C.bluBg,border:"1px solid "+C.blu+"40",padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:22}}>⚖️</div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:C.bluTx}}>Saturday weigh-in</div>
          <div style={{fontSize:11,color:C.bluTx,marginTop:1}}>First thing — fasted, post-toilet. Only the trend matters.</div>
        </div>
        <button onClick={()=>{setTab("activity");setAddB(true);}} style={{padding:"8px 12px",borderRadius:8,border:"none",background:C.blu,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Log</button>
      </div>}

      <div style={card}>
        <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.txt}}>Tasks</div>
            <div style={{fontSize:11,color:C.t2,marginTop:1}}>{allToday.length} open{overdueC>0?" · "+overdueC+" overdue":""}{mustDoAll.length>0?" · "+mustDoAll.length+" pinned":""}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{const list=mustDoAll.length>0?mustDoAll:allToday;if(list.length===0){alert("No tasks");return;}const text="Today's tasks:\n"+list.map((t,i)=>(i+1)+". "+t.text).join("\n");navigator.clipboard&&navigator.clipboard.writeText(text).then(()=>alert("Copied — paste into Google Keep for Gemini/Echo"),()=>alert(text));}} style={{padding:"8px 10px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:11,fontWeight:600,color:C.t2,fontFamily:"inherit"}} title="Copy to clipboard — paste into Google Keep for Gemini to read">📋 Copy</button>
            <button onClick={()=>setTab("tasks")} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:12,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>View all</button>
            <button onClick={()=>{setTab("tasks");setAddT(true);}} style={btnP(C.grn)}>+ Add</button>
          </div>
        </div>
        {allToday.length===0&&<div style={{padding:"4px 16px 16px",textAlign:"center"}}>
          <div style={{color:C.t3,fontSize:12}}>Nothing to do. Add a task from Tasks tab.</div>
        </div>}
        {allToday.length>0&&mustDoAll.length===0&&<div style={{padding:"0 16px 12px",fontSize:11,color:C.amb,fontStyle:"italic"}}>No must-dos pinned. Star tasks from Tasks tab to focus.</div>}
      </div>

      {activeP.length>0&&<div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Projects</div></div>
        {activeP.map((p,i)=>{const d=p.subtasks.filter(s=>s.done).length,t=p.subtasks.length,pct=t>0?Math.round((d/t)*100):0;
          return <div key={p.id} style={{padding:"12px 16px",borderBottom:i<activeP.length-1?"1px solid "+C.bdr:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.title}</div>
              <span style={{fontSize:12,fontWeight:600,color:pct===100?C.grn:C.vio}}>{pct}%</span>
            </div>
            <div style={{background:C.bdr,borderRadius:99,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,background:pct===100?C.grn:C.vio,width:pct+"%",transition:"width 0.3s"}}/>
            </div>
          </div>;
        })}
      </div>}

      <div style={card}>
        <div style={{padding:14}}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:12}}>Activity</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {customActs.map(name=>{const done=isA(name,TD);const st=actStyle(name);const streak=getStreak(name);
              return <button key={name} onClick={()=>tgl(name,TD)} style={{padding:"16px 10px",borderRadius:14,cursor:"pointer",fontFamily:"'DM Sans',system-ui",textAlign:"center",position:"relative",
                border:done?"2px solid "+st.color:"1px solid "+C.bdr,background:done?st.bg:"transparent",color:done?st.tx:C.t3,fontSize:13,fontWeight:600}}>
                {streak>=2&&<span style={{position:"absolute",top:6,right:8,fontSize:10,fontWeight:700,color:done?st.color:C.t2,display:"flex",alignItems:"center",gap:2}}>{Ico.flame}{streak}</span>}
                {name}{done&&<span style={{display:"block",fontSize:16,marginTop:4,color:st.color}}>✓</span>}
              </button>;
            })}
          </div>
        </div>
      </div>

      <div style={card}>
        <div style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:15,fontWeight:700,color:C.txt}}>This week</div>
            <span style={pl(wkRate>=50?C.grnBg:C.ambBg,wkRate>=50?C.grnTx:C.ambTx)}>{wkRate}%</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {wkD.map(d=>{const full=d.done.length===customActs.length,some=d.done.length>0,missed=!d.future&&!d.today&&d.done.length<customActs.length;
              return <div key={d.date} style={{textAlign:"center",opacity:d.future?0.3:1,position:"relative"}}>
                <div style={{fontSize:9,color:d.today?C.txt:C.t3,fontWeight:d.today?700:500,marginBottom:3}}>{d.day}</div>
                <div style={{width:30,height:30,borderRadius:10,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,position:"relative",
                  background:full?C.grnBg:some?C.ambBg:"transparent",color:full?C.grnTx:some?C.ambTx:C.t3,border:d.today?"2px solid "+C.txt:"1px solid "+C.bdr}}>
                  {d.done.length||"—"}
                  {missed&&d.done.length<customActs.length&&d.done.length===0&&<span style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:C.red,border:"1.5px solid "+C.bg}}/>}
                </div>
              </div>;
            })}
          </div>
        </div>
      </div>

      {goals.filter(g=>g.status!=="Done").length>0&&<div style={card}>
        <div style={{padding:"14px 16px"}}><div style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:8}}>Goals</div>
        {goals.filter(g=>g.status!=="Done").map(g=>{const sm={"In progress":{bg:C.vioBg,c:C.vioTx},"Almost done":{bg:C.grnBg,c:C.grnTx},"On hold":{bg:C.ambBg,c:C.ambTx}};const sc=sm[g.status]||sm["In progress"];
          return <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
            <span style={{fontSize:13,fontWeight:500,color:C.txt}}>{g.text}</span><span style={pl(sc.bg,sc.c)}>{g.status}</span>
          </div>;
        })}</div>
      </div>}
    </div>}

    {/* ══════ TASKS ══════ */}
    {tab==="tasks"&&<div className="fade-in">
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>
        {["today","upcoming","overdue","all","done"].map(v=><button key={v} onClick={()=>setVm(v)} style={{padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",textTransform:"capitalize",background:vm===v?C.slate:C.card,color:vm===v?"#fff":C.t2,whiteSpace:"nowrap"}}>{v}{v==="overdue"&&overdueC>0?" ("+overdueC+")":""}</button>)}
      </div>
      <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto"}}>
        <button onClick={()=>setFlt("all")} style={{padding:"5px 12px",borderRadius:99,border:flt==="all"?"2px solid "+C.slate:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:11,fontWeight:600,color:flt==="all"?C.txt:C.t2,fontFamily:"inherit"}}>All</button>
        {CATS.map(c=><button key={c.key} onClick={()=>setFlt(c.key)} style={{padding:"5px 12px",borderRadius:99,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",border:flt===c.key?"2px solid "+c.c:"1px solid "+C.bdr,background:flt===c.key?c.bg:"transparent",color:flt===c.key?c.c:C.t2,whiteSpace:"nowrap"}}>{c.label}</button>)}
      </div>

      {filtT.length===0&&<div style={{...card,padding:"32px 16px",textAlign:"center"}}>
        <div style={{fontSize:28,opacity:0.3,marginBottom:6}}>✓</div>
        <div style={{color:C.t3,fontSize:13}}>No tasks here</div>
      </div>}

      {filtT.map(t=>{const c=gc(t.cat);const od=t.due<TD&&!t.done;
        return <div key={t.id} style={{...card,marginBottom:6}}>
          {editId===t.id?<div style={{padding:14}}>
            <input value={editF.text||""} onChange={e=>setEditF(f=>({...f,text:e.target.value}))} style={inp} autoFocus/>
            <input type="date" value={editF.due||""} onChange={e=>setEditF(f=>({...f,due:e.target.value}))} style={inp}/>
            <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              {CATS.map(cc=><button key={cc.key} onClick={()=>setEditF(f=>({...f,cat:cc.key}))} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:editF.cat===cc.key?"2px solid "+cc.c:"1px solid "+C.bdr,background:editF.cat===cc.key?cc.bg:"transparent",color:editF.cat===cc.key?cc.c:C.t2}}>{cc.label}</button>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>saveEdit(t.id)} style={{...btnP(C.grn),flex:1,padding:10}}>Save</button>
              <button onClick={()=>setEditId(null)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
            </div>
          </div>:<div style={{padding:"10px 14px",display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={()=>tglDone(t.id)} style={{width:22,height:22,borderRadius:7,flexShrink:0,border:t.done?"none":"2px solid "+(od?C.red:c.c),background:t.done?C.grn:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{t.done&&Ico.check}</button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:C.txt,textDecoration:t.done?"line-through":"none",opacity:t.done?0.5:1}}>{t.text}</div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                <span style={pl(c.bg,c.tx)}>{c.label}</span>
                {t.pri==="urgent"&&<span style={pl(C.redBg,C.redTx)}>Urgent</span>}
                {t.recur&&<span style={pl(C.bluBg,C.bluTx)}>{t.recur}</span>}
                {od&&<span style={{fontSize:11,fontWeight:600,color:C.red}}>Overdue</span>}
                {t.due!==TD&&!od&&<span style={{fontSize:11,color:C.t3}}>{fmt(t.due)}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button onClick={()=>togglePin(t.id)} style={{width:26,height:26,borderRadius:8,border:"none",background:t.mustDoDate===TD?C.amb:C.bdr,cursor:"pointer",color:t.mustDoDate===TD?"#fff":C.t2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}} title="Must-do today">★</button>
              <a href={calUrl(t.text,t.due)} target="_blank" rel="noopener" style={{width:26,height:26,borderRadius:8,background:C.grnBg,color:C.grn,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.cal}</a>
              <button onClick={()=>{setEditId(t.id);setEditF({text:t.text,cat:t.cat,due:t.due,pri:t.pri,recur:t.recur||""});}} style={{width:26,height:26,borderRadius:8,border:"none",background:C.bdr,cursor:"pointer",color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.edit}</button>
              <button onClick={()=>delT(t.id)} style={{width:26,height:26,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.trash}</button>
            </div>
          </div>}
        </div>;
      })}

      {!addT&&<div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setAddT(true)} style={{flex:1,padding:12,borderRadius:12,border:"2px dashed "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>+ New task</button>
        <button onClick={()=>setTmpl(!tmpl)} style={{padding:"12px 16px",borderRadius:12,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>Templates</button>
      </div>}
      {tmpl&&<div style={{...card,padding:14,marginTop:8}}><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{TMPLS.map((t,i)=><button key={i} onClick={()=>{upd(d=>({tasks:[{id:uid(),text:t,cat:"property",due:TD,pri:"normal",done:false,created:TD,recur:""},...d.tasks]}));setTmpl(false);}} style={{padding:"5px 10px",borderRadius:99,border:"1px solid "+C.grn+"40",background:C.grnBg,color:C.grnTx,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ {t}</button>)}</div></div>}

      {addT&&<div style={{...card,padding:14,marginTop:8}} className="fade-in">
        <input value={tf.text} onChange={e=>setTf(f=>({...f,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doAddT()} placeholder="What needs doing?" style={{...inp,fontSize:14}} autoFocus/>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {CATS.map(c=><button key={c.key} onClick={()=>setTf(f=>({...f,cat:c.key}))} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:tf.cat===c.key?"2px solid "+c.c:"1px solid "+C.bdr,background:tf.cat===c.key?c.bg:"transparent",color:tf.cat===c.key?c.c:C.t2}}>{c.label}</button>)}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input type="date" value={tf.due} onChange={e=>setTf(f=>({...f,due:e.target.value}))} style={{...inp,flex:1,marginBottom:0}}/>
          <button onClick={()=>setTf(f=>({...f,pri:f.pri==="urgent"?"normal":"urgent"}))} style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",border:tf.pri==="urgent"?"2px solid "+C.red:"1px solid "+C.bdr,background:tf.pri==="urgent"?C.redBg:"transparent",color:tf.pri==="urgent"?C.redTx:C.t2}}>Urgent</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["","weekly","monthly"].map(r=><button key={r} onClick={()=>setTf(f=>({...f,recur:r}))} style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:tf.recur===r?"2px solid "+C.blu:"1px solid "+C.bdr,background:tf.recur===r?C.bluBg:"transparent",color:tf.recur===r?C.bluTx:C.t2}}>{r||"One-off"}</button>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddT} style={{...btnP(C.grn),flex:1,padding:12,fontSize:14}}>Add task</button>
          <button onClick={()=>setAddT(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,color:C.t2}}>Cancel</button>
        </div>
      </div>}
    </div>}

    {/* ══════ PROJECTS & GOALS ══════ */}
    {tab==="proj"&&<div className="fade-in">
      <div style={{fontSize:16,fontWeight:700,color:C.txt,marginBottom:10}}>Projects</div>
      {projects.length===0&&<div style={{...card,padding:"32px 16px",textAlign:"center",marginBottom:12}}>
        <div style={{color:C.t3,fontSize:13}}>No projects yet. Add one below.</div>
      </div>}
      {projects.map(p=>{const d=p.subtasks.filter(s=>s.done).length,t=p.subtasks.length,pct=t>0?Math.round((d/t)*100):0;
        return <div key={p.id} style={{...card,opacity:p.status==="done"?0.5:1}}>
          {editPid===p.id?<div style={{padding:14}}>
            <input value={editPf.title||""} onChange={e=>setEditPf(f=>({...f,title:e.target.value}))} style={inp}/>
            <input type="date" value={editPf.deadline||""} onChange={e=>setEditPf(f=>({...f,deadline:e.target.value}))} style={inp}/>
            <input value={editPf.notes||""} onChange={e=>setEditPf(f=>({...f,notes:e.target.value}))} placeholder="Notes" style={inp}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{updP(p.id,editPf);setEditPid(null);}} style={{...btnP(C.grn),flex:1,padding:10}}>Save</button>
              <button onClick={()=>setEditPid(null)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
            </div>
          </div>:<>
            <div style={{padding:"12px 16px",borderBottom:"1px solid "+C.bdr}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{p.title}</div>
                  {p.deadline&&<div style={{fontSize:11,color:C.t2,marginTop:2}}>Due {fmt(p.deadline)}</div>}
                  {p.notes&&<div style={{fontSize:12,color:C.t2,marginTop:2}}>{p.notes}</div>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <select value={p.status} onChange={e=>updP(p.id,{status:e.target.value})} style={{padding:"4px 8px",borderRadius:8,border:"1px solid "+C.bdr,background:C.card,color:C.txt,fontSize:11,fontWeight:600,outline:"none"}}><option value="active">Active</option><option value="on-hold">On hold</option><option value="done">Done</option></select>
                  <button onClick={()=>{setEditPid(p.id);setEditPf({title:p.title,deadline:p.deadline,notes:p.notes});}} style={{width:26,height:26,borderRadius:8,border:"none",background:C.bdr,cursor:"pointer",color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.edit}</button>
                  <button onClick={()=>delP(p.id)} style={{width:26,height:26,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.trash}</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,background:C.bdr,borderRadius:99,height:7,overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,background:pct===100?C.grn:C.vio,width:pct+"%",transition:"width 0.3s"}}/></div>
                <span style={{fontSize:12,fontWeight:600,color:pct===100?C.grn:C.vio}}>{pct}%</span>
              </div>
            </div>
            <div style={{padding:"4px 0"}}>
              {p.subtasks.map(st=><div key={st.id} style={{padding:"8px 16px",display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={()=>tglSub(p.id,st.id)} style={{width:20,height:20,borderRadius:6,flexShrink:0,border:st.done?"none":"2px solid "+C.vio,background:st.done?C.grn:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{st.done&&Ico.check}</button>
                <div style={{flex:1,fontSize:13,color:C.txt,textDecoration:st.done?"line-through":"none"}}>{st.text}</div>
                {st.due&&<span style={{fontSize:10,color:C.t3}}>{fmt(st.due)}</span>}
                {!st.done&&<button onClick={()=>togglePinSub(p.id,st.id,TD)} style={{width:22,height:22,borderRadius:6,border:"none",background:st.mustDoDate===TD?C.amb:"transparent",cursor:"pointer",color:st.mustDoDate===TD?"#fff":C.t3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}} title="Must-do today">★</button>}
                <button onClick={()=>delSub(p.id,st.id)} style={{width:20,height:20,borderRadius:6,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.trash}</button>
              </div>)}
              {addSub===p.id?<div style={{padding:"8px 16px",display:"flex",gap:6,flexWrap:"wrap"}}>
                <input value={subF.text} onChange={e=>setSubF(f=>({...f,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doAddSub(p.id)} placeholder="Subtask..." style={{...inp,flex:1,marginBottom:0,minWidth:120}} autoFocus/>
                <input type="date" value={subF.due} onChange={e=>setSubF(f=>({...f,due:e.target.value}))} style={{...inp,width:130,marginBottom:0}}/>
                <button onClick={()=>doAddSub(p.id)} style={btnP(C.vio)}>Add</button>
                <button onClick={()=>setAddSub(null)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:12}}>×</button>
              </div>:<div style={{padding:"6px 16px 10px"}}><button onClick={()=>{setAddSub(p.id);setSubF({text:"",due:""});}} style={{fontSize:12,color:C.vio,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Add subtask</button></div>}
            </div>
          </>}
        </div>;
      })}

      {addP?<div style={{...card,padding:14}}>
        <div style={{fontSize:14,fontWeight:700,color:C.txt,marginBottom:10}}>New project</div>
        <input value={pf.title} onChange={e=>setPf(f=>({...f,title:e.target.value}))} placeholder="Project title" style={inp} autoFocus/>
        <input type="date" value={pf.deadline} onChange={e=>setPf(f=>({...f,deadline:e.target.value}))} style={inp}/>
        <input value={pf.notes} onChange={e=>setPf(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)" style={inp}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddP} style={{...btnP(C.vio),flex:1,padding:12,fontSize:14}}>Create</button>
          <button onClick={()=>setAddP(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,color:C.t2}}>Cancel</button>
        </div>
      </div>:<button onClick={()=>setAddP(true)} style={{width:"100%",padding:12,borderRadius:12,border:"2px dashed "+C.vio+"60",cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.vio,fontFamily:"inherit",marginBottom:16}}>+ New project</button>}

      <div style={{fontSize:16,fontWeight:700,color:C.txt,marginTop:20,marginBottom:10}}>Goals</div>
      {goals.map(g=>{const sm={"In progress":{bg:C.vioBg,c:C.vioTx},"Almost done":{bg:C.grnBg,c:C.grnTx},"On hold":{bg:C.ambBg,c:C.ambTx},"Done":{bg:C.grnBg,c:C.grnTx}};const sc=sm[g.status]||sm["In progress"];
        return <div key={g.id} style={{...card,opacity:g.status==="Done"?0.5:1}}>
          <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:C.txt,textDecoration:g.status==="Done"?"line-through":"none"}}>{g.text}</div>{g.deadline&&<div style={{fontSize:11,color:C.t2,marginTop:3}}>Deadline: {fmt(g.deadline)}</div>}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              <select value={g.status} onChange={e=>updG(g.id,{status:e.target.value})} style={{padding:"4px 8px",borderRadius:8,border:"1px solid "+sc.c+"40",background:sc.bg,color:sc.c,fontSize:11,fontWeight:600,outline:"none",cursor:"pointer"}}><option value="In progress">In progress</option><option value="Almost done">Almost done</option><option value="On hold">On hold</option><option value="Done">Done</option></select>
              <button onClick={()=>delG(g.id)} style={{width:24,height:24,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.trash}</button>
            </div>
          </div>
        </div>;
      })}
      {addG?<div style={{...card,padding:14}}>
        <input value={gf.text} onChange={e=>setGf(f=>({...f,text:e.target.value}))} placeholder="Goal (e.g. Buy 2 more properties)" style={inp} autoFocus/>
        <input type="date" value={gf.deadline} onChange={e=>setGf(f=>({...f,deadline:e.target.value}))} style={inp}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddG} style={{...btnP(C.grn),flex:1,padding:10}}>Add goal</button>
          <button onClick={()=>setAddG(false)} style={{padding:"10px 14px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
        </div>
      </div>:<button onClick={()=>setAddG(true)} style={{width:"100%",padding:12,borderRadius:12,border:"2px dashed "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>+ New goal</button>}
    </div>}

    {/* ══════ ACTIVITY ══════ */}
    {tab==="activity"&&<div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14}}>
        <button onClick={()=>setActDate(dateShift(actDate,-1))} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{actDate===TD?"Today":fmtFull(actDate)}</div>
          {actDate!==TD&&<button onClick={()=>setActDate(TD)} style={{fontSize:11,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",marginTop:2}}>Back to today</button>}
        </div>
        <button onClick={()=>{if(actDate<TD)setActDate(dateShift(actDate,1));}} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt,opacity:actDate>=TD?0.3:1}}>→</button>
      </div>

      <div style={card}>
        <div style={cHead}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>Activities</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>toggleRest()} style={{padding:"4px 10px",borderRadius:99,border:isRest()?"none":"1px solid "+C.bdr,cursor:"pointer",background:isRest()?C.purp:"transparent",color:isRest()?"#fff":C.t2,fontSize:10,fontWeight:600,fontFamily:"inherit"}} title="Planned rest day doesn't count against you">{isRest()?"✓ Rest day":"Rest day"}</button>
            {!isRest()&&<span style={pl(customActs.filter(a=>isA(a)).length===customActs.length?C.grnBg:C.ambBg,customActs.filter(a=>isA(a)).length===customActs.length?C.grnTx:C.ambTx)}>{customActs.filter(a=>isA(a)).length}/{customActs.length}</span>}
          </div>
        </div>
        {isRest()&&<div style={{padding:"10px 16px",background:C.purpBg,fontSize:12,color:C.purpTx,borderBottom:"1px solid "+C.bdr,textAlign:"center"}}>Rest day — won't count as missed</div>}
        <div style={{padding:"14px 16px",opacity:isRest()?0.5:1}}>
          {customActs.map(name=>{const done=isA(name);const st=actStyle(name);const note=getActNote(name);const streak=getStreak(name);const isEditing=editAct===name+"-"+actDate;const isRenaming=editAct==="rename-"+name;
            return <div key={name} style={{marginBottom:10}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>tgl(name)} style={{flex:1,padding:"12px 10px",borderRadius:12,cursor:"pointer",fontFamily:"'DM Sans',system-ui",textAlign:"left",fontSize:13,fontWeight:600,
                  border:done?"2px solid "+st.color:"1px solid "+C.bdr,background:done?st.bg:"transparent",color:done?st.tx:C.t3,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{display:"flex",alignItems:"center",gap:8}}>{name}{streak>=2&&actDate===TD&&<span style={{fontSize:10,fontWeight:700,color:done?st.color:C.t2,background:done?"rgba(255,255,255,0.4)":"transparent",padding:"2px 6px",borderRadius:8,display:"flex",alignItems:"center",gap:2}}>{Ico.flame}{streak}</span>}</span>
                  {done&&<span style={{color:st.color}}>✓</span>}
                </button>
                <button onClick={()=>{if(isRenaming){setEditAct(null);}else{setEditAct("rename-"+name);setActNoteIn(name);}}} style={{width:28,height:28,borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ico.edit}</button>
                {done&&<button onClick={()=>{if(isEditing){setEditAct(null);}else{setEditAct(name+"-"+actDate);setActNoteIn(note);}}} style={{width:28,height:28,borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:note?st.bg:C.card,fontSize:11,color:note?st.tx:C.t3,display:"flex",alignItems:"center",justifyContent:"center"}}>{note?"📝":"+"}</button>}
              </div>
              {isRenaming&&<div style={{display:"flex",gap:8,marginTop:6}}>
                <input value={actNoteIn} onChange={e=>setActNoteIn(e.target.value)} placeholder="New name" style={{...inp,flex:1,marginBottom:0,fontSize:12}} autoFocus/>
                <button onClick={()=>{const newName=actNoteIn.trim();if(newName&&newName!==name){upd(d=>{const newActs={...d.acts};const newNotes={...d.actNotes};Object.keys(newActs).forEach(k=>{if(k.startsWith(name+"-")){newActs[k.replace(name+"-",newName+"-")]=newActs[k];delete newActs[k];}});Object.keys(newNotes).forEach(k=>{if(k.startsWith(name+"-")){newNotes[k.replace(name+"-",newName+"-")]=newNotes[k];delete newNotes[k];}});return{customActs:d.customActs.map(a=>a===name?newName:a),acts:newActs,actNotes:newNotes};});}setEditAct(null);}} style={btnP(C.grn)}>Save</button>
                <button onClick={()=>{if(confirm("Delete '"+name+"'?")){upd(d=>({customActs:d.customActs.filter(a=>a!==name)}));setEditAct(null);}}} style={btnP(C.redBg,C.redTx)}>Delete</button>
              </div>}
              {isEditing&&<div style={{display:"flex",gap:8,marginTop:6}}>
                <input value={actNoteIn} onChange={e=>setActNoteIn(e.target.value)} placeholder={"Detail: e.g. 45 mins, back"} style={{...inp,flex:1,marginBottom:0,fontSize:12}} autoFocus/>
                <button onClick={()=>{setActNote(name,actNoteIn);setEditAct(null);}} style={btnP(C.grn)}>Save</button>
              </div>}
              {!isEditing&&!isRenaming&&note&&<div style={{fontSize:11,color:st.tx,marginTop:4,paddingLeft:4}}>{note}</div>}
            </div>;
          })}
        </div>
        <div style={{padding:"4px 16px 12px",borderTop:"1px solid "+C.bdr}}>
          {addAct?<div style={{display:"flex",gap:8}}>
            <input value={actN} onChange={e=>setActN(e.target.value)} placeholder="Activity name" style={{...inp,flex:1,marginBottom:0}} autoFocus/>
            <button onClick={()=>{if(actN.trim()){upd(d=>({customActs:[...d.customActs,actN.trim()]}));setActN("");setAddAct(false);}}} style={btnP(C.grn)}>Add</button>
          </div>:<button onClick={()=>setAddAct(true)} style={{fontSize:12,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Add activity</button>}
        </div>
      </div>

      {/* STEPS */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Steps</div>{getSteps()>0&&<span style={pl(getSteps()>=10000?C.grnBg:C.ambBg,getSteps()>=10000?C.grnTx:C.ambTx)}>{getSteps().toLocaleString()}</span>}</div>
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <button onClick={()=>setSteps(actDate,Math.max(0,getSteps()-1000))} style={{width:40,height:40,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,fontWeight:600,color:C.txt,fontFamily:"inherit"}}>−1k</button>
            <button onClick={()=>setSteps(actDate,Math.max(0,getSteps()-500))} style={{width:40,height:40,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:13,fontWeight:600,color:C.txt,fontFamily:"inherit"}}>−500</button>
            <div style={{flex:1,textAlign:"center",padding:"8px",borderRadius:10,background:getSteps()>=10000?C.grnBg:getSteps()>0?C.ambBg:"transparent",border:"1px solid "+C.bdr}}>
              <div style={{fontSize:22,fontWeight:700,color:getSteps()>=10000?C.grnTx:getSteps()>0?C.ambTx:C.t3,fontFamily:"'Playfair Display',serif"}}>{getSteps().toLocaleString()}</div>
              <div style={{fontSize:9,color:C.t2,fontWeight:600,letterSpacing:0.8}}>STEPS</div>
            </div>
            <button onClick={()=>setSteps(actDate,getSteps()+500)} style={{width:40,height:40,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:13,fontWeight:600,color:C.txt,fontFamily:"inherit"}}>+500</button>
            <button onClick={()=>setSteps(actDate,getSteps()+1000)} style={{width:40,height:40,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,fontWeight:600,color:C.txt,fontFamily:"inherit"}}>+1k</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[5000,7500,10000,12500].map(v=><button key={v} onClick={()=>setSteps(actDate,v)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:getSteps()===v?C.grnBg:"transparent",color:getSteps()===v?C.grnTx:C.t2,fontSize:11,fontWeight:600,fontFamily:"inherit"}}>{(v/1000).toFixed(v%1000===0?0:1)}k</button>)}
            {getSteps()>0&&<button onClick={()=>setSteps(actDate,0)} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:11}}>Clear</button>}
          </div>
        </div>
      </div>

      {/* 2-WEEK VIEW WITH MISSED RED DOTS */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Last 2 weeks</div><span style={pl(C.grnBg,C.grnTx)}>{wkRate}% this wk</span></div>
        {twData.map((d,i)=>{const hasNotes=Object.keys(d.notes).length>0;const st=steps[d.date]||0;const rest=!!restDays[d.date];const someMissed=!d.future&&!d.today&&!rest&&d.missed.length>0&&d.done.length>0;
          return <div key={d.date} style={{borderBottom:i<13?"1px solid "+C.bdr:"none",opacity:d.future?0.3:1,background:rest?C.purpBg+"60":"transparent"}}>
            <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setActDate(d.date)}>
              <div style={{width:36,textAlign:"center",position:"relative"}}>
                <div style={{fontSize:10,fontWeight:d.today?700:500,color:d.today?C.txt:d.isThisWeek?C.t2:C.t3}}>{d.day}</div>
                <div style={{fontSize:14,fontWeight:700,color:d.today?C.txt:d.isThisWeek?C.t2:C.t3}}>{d.num}</div>
                {!d.future&&!d.today&&!rest&&d.done.length===0&&<span style={{position:"absolute",top:0,right:0,width:6,height:6,borderRadius:"50%",background:C.red}}/>}
              </div>
              <div style={{flex:1,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                {rest?<span style={pl(C.purpBg,C.purpTx)}>Rest day</span>:d.done.length>0?d.done.map(a=>{const st2=actStyle(a);return <span key={a} style={pl(st2.bg,st2.tx)}>{a}</span>;}):<span style={{fontSize:11,color:C.t3}}>{d.future?"—":"No activity"}</span>}
                {someMissed&&<span style={{width:6,height:6,borderRadius:"50%",background:C.red,marginLeft:4}} title="Some habits missed"/>}
                {st>0&&<span style={{...pl(st>=10000?C.grnBg:C.ambBg,st>=10000?C.grnTx:C.ambTx),marginLeft:"auto"}}>{(st/1000).toFixed(1)}k</span>}
              </div>
            </div>
            {hasNotes&&<div style={{padding:"0 16px 8px 62px"}}>{Object.entries(d.notes).map(([act,note])=><div key={act} style={{fontSize:11,color:C.t2}}><span style={{fontWeight:600}}>{act}:</span> {note}</div>)}</div>}
          </div>;
        })}
      </div>

      {/* WEIGHT */}
      <div style={card}>
        <div style={cHead}><div><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Weight</div>
          <div style={{fontSize:12,color:C.t2,marginTop:1}}>{body.length>0?body[0].weight+"kg"+(body[0].waist?" · waist "+body[0].waist+"cm":"")+" — "+fmt(body[0].date):"Start tracking"}</div>
        </div>
          {etaText&&<span style={pl(weightTrend.slope<0?C.grnBg:C.ambBg,weightTrend.slope<0?C.grnTx:C.ambTx)}>{etaText}</span>}
        </div>
        <div style={{padding:"10px 16px",background:C.bluBg,borderBottom:"1px solid "+C.bdr}}>
          <div style={{fontSize:11,fontWeight:700,color:C.bluTx,marginBottom:2}}>When to weigh in</div>
          <div style={{fontSize:11,color:C.bluTx,lineHeight:1.5}}>Saturday morning, first thing after toilet, before food or water. Same every week. Only the trend matters.</div>
        </div>
        {body.length>=2&&<div style={{padding:"8px 16px"}}>
          <WChart data={body} ma={weightTrend.ma}/>
          <div style={{display:"flex",gap:12,justifyContent:"center",fontSize:10,color:C.t2,marginTop:4}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:2,background:C.grn,display:"inline-block"}}/>Weight</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:2,background:C.slate,display:"inline-block",backgroundImage:"repeating-linear-gradient(90deg,"+C.slate+" 0 3px,transparent 3px 6px)"}}/>7-day avg</span>
          </div>
        </div>}
        {addB?<div style={{padding:"10px 16px 14px",borderTop:body.length>=2?"1px solid "+C.bdr:"none"}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={bw} onChange={e=>setBw(e.target.value)} placeholder="Weight (kg)" type="number" step="0.1" style={{...inp,flex:1,marginBottom:0}} autoFocus/>
            <input value={bwaist} onChange={e=>setBwaist(e.target.value)} placeholder="Waist (cm)" type="number" step="0.1" style={{...inp,flex:1,marginBottom:0}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={doAddB} style={{...btnP(C.grn),flex:1}}>Save weigh-in</button>
            <button onClick={()=>setAddB(false)} style={{padding:"10px 14px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
          </div>
          <div style={{fontSize:10,color:C.t3,marginTop:6}}>Waist is optional. Adds a second data point for fat-loss tracking.</div>
        </div>:<div style={{padding:"8px 16px 14px",borderTop:body.length>=2?"1px solid "+C.bdr:"none"}}><button onClick={()=>setAddB(true)} style={{fontSize:12,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Log weigh-in</button></div>}
      </div>
    </div>}

    {/* ══════ FOOD ══════ */}
    {tab==="food"&&<div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14}}>
        <button onClick={()=>setFoodDate(dateShift(foodDate,-1))} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{foodDate===TD?"Today":fmtFull(foodDate)}</div>
          {foodDate!==TD&&<button onClick={()=>setFoodDate(TD)} style={{fontSize:11,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",marginTop:2}}>Back to today</button>}
        </div>
        <button onClick={()=>{if(foodDate<TD)setFoodDate(dateShift(foodDate,1));}} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt,opacity:foodDate>=TD?0.3:1}}>→</button>
      </div>

      <div style={card}>
        <div style={{padding:"18px 16px",textAlign:"center"}}>
          <div style={{position:"relative",width:180,height:180,margin:"0 auto 12px"}}>
            <svg viewBox="0 0 180 180" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
              <circle cx="90" cy="90" r="78" fill="none" stroke={C.bdr} strokeWidth="12"/>
              <circle cx="90" cy="90" r="78" fill="none" stroke={dayProtein>=proteinTarget?C.grn:C.coral} strokeWidth="12" strokeLinecap="round" strokeDasharray={490} strokeDashoffset={490-(Math.min(dayProtein,proteinTarget)/proteinTarget)*490} style={{transition:"stroke-dashoffset 0.5s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:36,fontWeight:700,color:C.txt,fontFamily:"'Playfair Display',serif"}}>{dayProtein}<span style={{fontSize:16,color:C.t2,fontFamily:"'DM Sans',sans-serif"}}>g</span></div>
              <div style={{fontSize:11,color:C.t2,marginTop:2}}>of {proteinTarget}g target</div>
              <div style={{fontSize:10,color:dayProteinPct>=100?C.grn:C.coral,fontWeight:700,marginTop:4}}>{dayProteinPct}%</div>
            </div>
          </div>
          <div style={{fontSize:11,color:C.t2,lineHeight:1.5,maxWidth:280,margin:"0 auto"}}>Target: {latestWeight}kg × 1.8g = {proteinTarget}g. Auto-recalculates on new weigh-in.</div>
        </div>
      </div>

      {/* QUICK ADDS */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Quick add</div><span style={{fontSize:11,color:C.t3}}>Your regulars</span></div>
        <div style={{padding:"10px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
          {foods.map((f,i)=><button key={i} onClick={()=>quickAdd(f)} style={{padding:"8px 12px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:12,fontWeight:600,color:C.txt,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
            {f.name}<span style={{fontSize:10,color:C.coralTx,background:C.coralBg,padding:"2px 6px",borderRadius:6,fontWeight:700}}>{f.protein}g</span>
          </button>)}
        </div>
      </div>

      {/* SUGGESTIONS IF BEHIND */}
      {proteinDeficit>10&&foodDate===TD&&<div style={card}>
        <div style={cHead}><div><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Behind by {proteinDeficit}g</div><div style={{fontSize:11,color:C.t2,marginTop:1}}>{now.getHours()<11?"Morning":now.getHours()<15?"Lunch":now.getHours()<18?"Afternoon":"Evening"} — pick something fast</div></div></div>
        <div style={{padding:"10px 12px"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:aiFoodSugg?10:0}}>
            {suggested.length===0?<div style={{fontSize:12,color:C.t3,padding:6}}>No matches. Log a custom meal below.</div>:suggested.map((f,i)=><button key={i} onClick={()=>quickAdd(f)} style={{padding:"8px 12px",borderRadius:10,border:"2px solid "+C.coral,cursor:"pointer",background:C.coralBg,fontSize:12,fontWeight:600,color:C.coralTx,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
              + {f.name}<span style={{fontSize:10,background:"#fff",padding:"2px 6px",borderRadius:6,fontWeight:700}}>{f.protein}g</span>
            </button>)}
            <button onClick={()=>{
              if(!apiKey){setAiFoodSugg("Add API key in ⚙ first.");return;}
              setAiFoodLoad(true);setAiFoodSugg("");
              const h=now.getHours();const tod=h<11?"morning":h<15?"lunch":h<18?"afternoon":"evening";
              const eaten=dayMeals.map(m=>m.input).join("; ")||"nothing yet";
              callAI(apiKey,"Nutrition coach for Ash — 86kg male, boxing+weights, cutting fat. Direct, no fluff, no emoji. Give 3 specific, quick meals/snacks to hit the protein gap. Each under 15 words. Use real UK supermarket products or simple home items. Consider time of day and what's been eaten. Output format: just 3 numbered bullets, protein g in brackets. No intro, no outro.",
                "Gap: "+proteinDeficit+"g protein needed\nTime: "+tod+" ("+h+":00)\nAlready eaten today: "+eaten+"\nKeep low-faff. He's busy.",
                txt=>{setAiFoodSugg(txt);setAiFoodLoad(false);});
            }} disabled={aiFoodLoad} style={{padding:"8px 12px",borderRadius:10,border:"1.5px dashed "+C.slate,cursor:aiFoodLoad?"default":"pointer",background:"transparent",fontSize:12,fontWeight:600,color:aiFoodLoad?C.t3:C.slate,fontFamily:"inherit"}}>{aiFoodLoad?"Thinking...":"💡 AI suggest"}</button>
          </div>
          {aiFoodSugg&&<div style={{padding:12,background:"#fafaf7",borderRadius:10,fontSize:12,lineHeight:1.7,color:C.txt,whiteSpace:"pre-wrap",marginTop:4}}>{aiFoodSugg}<button onClick={()=>setAiFoodSugg("")} style={{display:"block",marginTop:8,fontSize:10,color:C.t3,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Dismiss</button></div>}
        </div>
      </div>}

      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>{mealDraft&&mealDraft._editingId?"Edit meal":"Log a meal"}</div>{mealDraft&&mealDraft._editingId&&<span style={pl(C.bluBg,C.bluTx)}>Editing</span>}</div>
        <div style={{padding:14}}>
          {!mealDraft&&<>
            <textarea value={mealIn} onChange={e=>setMealIn(e.target.value)} placeholder="e.g. 4 eggs, 200g chicken, 250g greek yoghurt" style={{...inp,minHeight:60,resize:"vertical",fontFamily:"inherit"}}/>
            <button onClick={()=>parseMeal(mealIn)} disabled={mealLoad||!mealIn.trim()} style={{width:"100%",padding:12,borderRadius:10,border:"none",cursor:mealLoad||!mealIn.trim()?"default":"pointer",background:mealLoad||!mealIn.trim()?C.bdr:C.coral,color:mealLoad||!mealIn.trim()?C.t3:"#fff",fontSize:14,fontWeight:600,fontFamily:"inherit"}}>{mealLoad?"Working it out...":"Calculate protein"}</button>
            {mealErr&&<div style={{fontSize:12,color:C.redTx,marginTop:8,padding:"8px 10px",background:C.redBg,borderRadius:8}}>{mealErr}</div>}
          </>}
          {mealDraft&&<div>
            <div style={{fontSize:12,color:mealDraft._editingId?C.vioTx:C.t2,marginBottom:8,fontWeight:mealDraft._editingId?600:400}}>{mealDraft._editingId?"Editing meal":"Review"} — tap any number to adjust</div>
            {mealDraft._editingId&&<input value={mealDraft.input} onChange={e=>setMealDraft(d=>({...d,input:e.target.value}))} placeholder="Meal description" style={{...inp,fontSize:13}}/>}
            {mealDraft.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<mealDraft.items.length-1?"1px solid "+C.bdr:"none",gap:6}}>
              <div style={{fontSize:13,color:C.txt,flex:1,paddingRight:4,minWidth:0}}>{it.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="number" value={it.protein} onChange={e=>updMealItem(i,e.target.value)} style={{width:50,padding:"4px 8px",borderRadius:8,border:"1px solid "+C.bdr,fontSize:13,fontWeight:700,color:C.coralTx,background:C.coralBg,textAlign:"right",outline:"none"}}/>
                <span style={{fontSize:12,color:C.t2}}>g</span>
                <button onClick={()=>{const items=mealDraft.items.filter((_,x)=>x!==i);const total=items.reduce((a,it)=>a+(it.protein||0),0);setMealDraft({...mealDraft,items,total});}} style={{width:22,height:22,borderRadius:6,border:"none",background:C.redBg,cursor:"pointer",color:C.redTx,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            </div>)}
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <input placeholder="Add item (e.g. 'apple')" id="mealAddName" style={{...inp,flex:1,marginBottom:0,fontSize:12}}/>
              <input type="number" placeholder="g" id="mealAddP" style={{...inp,width:60,marginBottom:0,fontSize:12}}/>
              <button onClick={()=>{const n=document.getElementById("mealAddName");const p=document.getElementById("mealAddP");if(!n.value.trim())return;const items=[...mealDraft.items,{name:n.value.trim(),protein:parseInt(p.value)||0}];const total=items.reduce((a,it)=>a+(it.protein||0),0);setMealDraft({...mealDraft,items,total});n.value="";p.value="";}} style={btnP(C.coral)}>Add</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0",borderTop:"2px solid "+C.bdr,marginTop:8}}>
              <div style={{fontSize:14,fontWeight:700,color:C.txt}}>Total</div>
              <div style={{fontSize:18,fontWeight:700,color:C.coralTx}}>{mealDraft.total}g</div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={saveMeal} style={{...btnP(C.grn),flex:1,padding:12,fontSize:14}}>{mealDraft._editingId?"Update meal":"Save meal"}</button>
              <button onClick={()=>{setMealDraft(null);setMealIn("");}} style={{padding:"12px 18px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13,fontFamily:"inherit"}}>Cancel</button>
            </div>
          </div>}
        </div>
      </div>

      {/* MEAL SLOT BREAKDOWN — catches back-loading */}
      {dayMeals.length>0&&<div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>By meal</div>{(()=>{const slotTotals=SLOT_ORDER.map(s=>dayMeals.filter(m=>(m.slot||mealSlotFromHour(new Date(m.time||0).getHours()))===s).reduce((a,m)=>a+(m.total||0),0));const beforeDinner=slotTotals[0]+slotTotals[1];const backloaded=dayProtein>0&&beforeDinner<dayProtein*0.4&&dayMeals.length>=2;return backloaded?<span style={pl(C.redBg,C.redTx)}>Back-loaded</span>:null;})()}</div>
        <div style={{padding:"12px 14px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {SLOT_ORDER.map(slot=>{const slotMeals=dayMeals.filter(m=>(m.slot||mealSlotFromHour(new Date(m.time||0).getHours()))===slot);const slotTotal=slotMeals.reduce((a,m)=>a+(m.total||0),0);const sc=SLOT_COLOR[slot];const pct=proteinTarget>0?Math.min(100,(slotTotal/(proteinTarget/3))*100):0;
