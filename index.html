function twoWeekDates(){
  const d=new Date(now),day=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-((day+6)%7)-7);
  return Array.from({length:14},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().split("T")[0];});
}

// next recurrence date
function nextRecur(due,type){
  const d=new Date(due);
  if(type==="weekly")d.setDate(d.getDate()+7);
  else if(type==="monthly")d.setMonth(d.getMonth()+1);
  return d.toISOString().split("T")[0];
}

// ═══ VOICE ═══
function speakText(text){
  if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  const clean=text.replace(/[^\x20-\x7E\n]/g," ").replace(/[*#_~`>|]/g,"").replace(/\n{2,}/g,". ").replace(/\n/g,". ").replace(/\s{2,}/g," ").trim();
  const parts=clean.match(/[^.!?]+[.!?]+/g)||[clean];let i=0;
  function next(){if(i>=parts.length)return;const u=new SpeechSynthesisUtterance(parts[i].trim());u.lang="en-GB";u.rate=0.93;
    const v=window.speechSynthesis.getVoices();const gb=v.find(x=>x.lang==="en-GB")||v.find(x=>x.lang.startsWith("en"));if(gb)u.voice=gb;
    u.onend=()=>{i++;next();};u.onerror=()=>{i++;next();};window.speechSynthesis.speak(u);}
  if(window.speechSynthesis.getVoices().length===0){window.speechSynthesis.onvoiceschanged=next;}else{next();}
}

// ═══ AI ═══
function callAI(key,sys,msg,cb){
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:[{role:"user",content:msg}]})
  }).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(d=>{cb(d.content?d.content.map(c=>c.text||"").join(""):"Error.");}).catch(e=>{cb("Error: "+e.message);});
}

// ═══ SVG WEIGHT CHART ═══
function WChart({data}){
  if(data.length<2)return null;
  const e=data.slice(0,12).reverse(),w=e.map(x=>x.weight);
  const mn=Math.min(...w),mx=Math.max(...w),rng=mx-mn||1;
  const W=320,H=110,px=24,py=18,iw=(W-px*2)/(e.length-1);
  const pts=e.map((x,i)=>({x:px+i*iw,y:py+(1-(x.weight-mn)/rng)*(H-py*2),w:x.weight,d:x.date}));
  const line=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  const area=line+" L"+pts[pts.length-1].x+","+(H-py)+" L"+pts[0].x+","+(H-py)+" Z";
  return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",display:"block"}}>
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.grn} stopOpacity="0.12"/><stop offset="100%" stopColor={C.grn} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#wg)"/><path d={line} fill="none" stroke={C.grn} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r={i===pts.length-1?4:2.5} fill={i===pts.length-1?C.grn:"#fff"} stroke={C.grn} strokeWidth="2"/>
    <text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fill={C.t2} fontWeight="500">{p.w}</text>
    <text x={p.x} y={H-3} textAnchor="middle" fontSize="8" fill={C.t3}>{fmt(p.d)}</text></g>)}
  </svg>;
}

        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {!apiKey&&<button onClick={()=>setShowKey(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,padding:0,color:C.amb}}>🔑</button>}
          {overdueC>0&&<span style={pl(C.redBg,C.redTx)}>{overdueC} overdue</span>}
          <span style={pl(todayDone.length===customActs.length?C.grnBg:C.ambBg,todayDone.length===customActs.length?C.grnTx:C.ambTx)}>{todayDone.length}/{customActs.length}</span>
        </div>
      </div>
    </div>

    {/* TABS */}
    <div style={{display:"flex",gap:4,padding:"16px 16px 0",marginBottom:16}}>
      {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{
        flex:1,padding:"10px 6px",borderRadius:12,border:tab===t.k?"1.5px solid "+C.bdr:"1.5px solid transparent",
        cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,textAlign:"center",
        background:tab===t.k?C.card:"transparent",color:tab===t.k?C.txt:C.t2,
      }}>{t.i}<br/>{t.l}</button>)}
    </div>

    {showKey&&<div style={{margin:"0 16px 12px",padding:14,background:C.ambBg,border:"1px solid "+C.amb+"40",borderRadius:14}}>
      <div style={{fontSize:13,fontWeight:600,color:C.ambTx,marginBottom:6}}>API key</div>
      <input value={keyIn} onChange={e=>setKeyIn(e.target.value)} type="password" placeholder="sk-ant-..." style={inp}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(keyIn.trim()){localStorage.setItem("ash-hq-key",keyIn.trim());setApiKey(keyIn.trim());setShowKey(false);setKeyIn("");}}} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:13,fontWeight:600}}>Save</button>
        <button onClick={()=>setShowKey(false)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
      </div>
    </div>}

    <div style={{padding:"0 16px"}}>

    {/* ══════ TODAY ══════ */}
    {tab==="today"&&<>
      <div style={card}>
        <div style={cHead}>
          <div><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Today's tasks</div><div style={{fontSize:12,color:C.t2,marginTop:1}}>{allToday.length} to do</div></div>
          <button onClick={()=>{setTab("tasks");setAddT(true);}} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:12,fontWeight:600}}>+ Add</button>
        </div>
        {allToday.length===0&&<div style={{padding:"20px 16px",textAlign:"center",color:C.t3,fontSize:13}}>Nothing to do — add a task or use templates</div>}
        {allToday.map((t,i)=>{
          const isSub=!!t._isSub;const c=isSub?null:gc(t.cat);const od=!isSub&&t.due<TD;
          return <div key={t.id+(isSub?"s":"")} style={{padding:"10px 16px",display:"flex",gap:10,alignItems:"center",borderBottom:i<allToday.length-1?"1px solid "+C.bdr:"none"}}>
            <button onClick={()=>{if(isSub)tglSub(t._pid,t.id);else tglDone(t.id);}} style={{width:22,height:22,borderRadius:7,flexShrink:0,border:"2px solid "+(od?C.red:isSub?C.vio:c.c),background:"transparent",cursor:"pointer"}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:C.txt}}>{t.text}</div>
              <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                {isSub&&<span style={pl(C.vioBg,C.vioTx)}>{t._pt}</span>}
                {!isSub&&<span style={pl(c.bg,c.tx)}>{c.label}</span>}
                {!isSub&&t.pri==="urgent"&&<span style={pl(C.redBg,C.redTx)}>Urgent</span>}
                {od&&<span style={{fontSize:11,fontWeight:600,color:C.red}}>Overdue</span>}
                {!isSub&&t.recur&&<span style={pl(C.bluBg,C.bluTx)}>{t.recur}</span>}
              </div>
            </div>
            <a href={calUrl(t.text,isSub?t.due:t.due)} target="_blank" rel="noopener" style={{fontSize:12,color:C.grn,textDecoration:"none",padding:4}}>📅</a>
          </div>;
        })}
        <div style={{padding:"8px 16px 12px",display:"flex",gap:6,overflowX:"auto"}}>
          {TMPLS.slice(0,3).map((t,i)=><button key={i} onClick={()=>upd(d=>({tasks:[{id:uid(),text:t,cat:"property",due:TD,pri:"normal",done:false,created:TD,recur:""},...d.tasks]}))} style={{padding:"5px 10px",borderRadius:99,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:11,color:C.t2,whiteSpace:"nowrap",fontFamily:"inherit"}}>+ {t}</button>)}
        </div>
      </div>

      {activeP.length>0&&<div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Projects</div></div>
        {activeP.map((p,i)=>{const d=p.subtasks.filter(s=>s.done).length,t=p.subtasks.length,pct=t>0?Math.round((d/t)*100):0;
          return <div key={p.id} style={{padding:"12px 16px",borderBottom:i<activeP.length-1?"1px solid "+C.bdr:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:13,fontWeight:600,color:C.txt}}>{p.title}</div>
              <span style={{fontSize:12,fontWeight:600,color:pct===100?C.grn:C.vio}}>{pct}%</span>
            </div>
            <div style={{background:C.bdr,borderRadius:99,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,background:pct===100?C.grn:C.vio,width:pct+"%",transition:"width 0.3s"}}/>
            </div>
          </div>;
        })}
      </div>}

      {/* Activity 2x2 */}
      <div style={card}>
        <div style={{padding:14}}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:12}}>Activity</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {customActs.map(name=>{const done=isA(name,TD);const st=actStyle(name);
              return <button key={name} onClick={()=>tgl(name,TD)} style={{padding:"16px 10px",borderRadius:14,cursor:"pointer",fontFamily:"'DM Sans',system-ui",textAlign:"center",
                border:done?"2px solid "+st.color:"1px solid "+C.bdr,background:done?st.bg:"transparent",color:done?st.tx:C.t3,fontSize:13,fontWeight:600,transition:"all 0.15s",
              }}>{name}{done&&<span style={{display:"block",fontSize:16,marginTop:4,color:st.color}}>✓</span>}</button>;
            })}
          </div>
        </div>
      </div>

      {/* Week mini */}
      <div style={card}>
        <div style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:15,fontWeight:700,color:C.txt}}>This week</div>
            <span style={pl(wkRate>=50?C.grnBg:C.ambBg,wkRate>=50?C.grnTx:C.ambTx)}>{wkRate}%</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {wkD.map(d=>{const full=d.done.length===customActs.length,some=d.done.length>0;
              return <div key={d.date} style={{textAlign:"center",opacity:d.future?0.3:1}}>
                <div style={{fontSize:9,color:d.today?C.txt:C.t3,fontWeight:d.today?700:500,marginBottom:3}}>{d.day}</div>
                <div style={{width:30,height:30,borderRadius:10,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
                  background:full?C.grnBg:some?C.ambBg:"transparent",color:full?C.grnTx:some?C.ambTx:C.t3,border:d.today?"2px solid "+C.txt:"1px solid "+C.bdr,
                }}>{d.done.length||"—"}</div>
              </div>;
            })}
          </div>
        </div>
      </div>

      {goals.filter(g=>g.status!=="Done").length>0&&<div style={card}>
        <div style={{padding:"14px 16px"}}><div style={{fontSize:15,fontWeight:700,color:C.txt,marginBottom:8}}>Goals</div>
        {goals.filter(g=>g.status!=="Done").map(g=>{
          const sm={"In progress":{bg:C.vioBg,c:C.vioTx},"Almost done":{bg:C.grnBg,c:C.grnTx},"On hold":{bg:C.ambBg,c:C.ambTx}};
          const sc=sm[g.status]||sm["In progress"];
          return <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
            <span style={{fontSize:13,fontWeight:500,color:C.txt}}>{g.text}</span><span style={pl(sc.bg,sc.c)}>{g.status}</span>
          </div>;
        })}</div>
      </div>}

      {/* AI collapsed */}
      <div style={card}>
        <button onClick={()=>setShowBrief(!showBrief)} style={{width:"100%",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"none",cursor:"pointer",background:"transparent",fontFamily:"inherit"}}>
          <div style={{textAlign:"left"}}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>AI Morning Briefing</div><div style={{fontSize:12,color:C.t2,marginTop:1}}>{brief?"Tap to view":"Generate your briefing"}</div></div>
          <span style={{color:C.t3}}>{showBrief?"▲":"▼"}</span>
        </button>
        {showBrief&&<div style={{borderTop:"1px solid "+C.bdr}}>
          <div style={{padding:"10px 16px",display:"flex",gap:8}}>
            {brief&&<button onClick={doSpk} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",background:spk?C.redBg:C.grnBg,color:spk?C.redTx:C.grnTx,fontSize:12,fontWeight:600}}>{spk?"Stop":"Play"}</button>}
            <button onClick={genBrief} disabled={bLoad} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",background:bLoad?C.bdr:C.slate,color:bLoad?C.t3:"#fff",fontSize:12,fontWeight:600}}>{bLoad?"Generating...":brief?"Refresh":"Generate"}</button>
          </div>
          {brief&&<div style={{padding:"10px 16px 16px",fontSize:13,lineHeight:1.8,color:C.txt,whiteSpace:"pre-wrap"}}>{brief}</div>}
          {!brief&&!bLoad&&<div style={{padding:"16px",textAlign:"center",color:C.t3,fontSize:13}}>{apiKey?"Tap Generate":"Add API key first"}</div>}
        </div>}
      </div>
    </>}

    {/* ══════ TASKS ══════ */}
    {tab==="tasks"&&<>
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>
        {["today","upcoming","overdue","all","done"].map(v=><button key={v} onClick={()=>setVm(v)} style={{padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",textTransform:"capitalize",background:vm===v?C.slate:C.card,color:vm===v?"#fff":C.t2,whiteSpace:"nowrap"}}>{v}{v==="overdue"&&overdueC>0?" ("+overdueC+")":""}</button>)}
      </div>
      <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto"}}>
        <button onClick={()=>setFlt("all")} style={{padding:"5px 12px",borderRadius:99,border:flt==="all"?"2px solid "+C.slate:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:11,fontWeight:600,color:flt==="all"?C.txt:C.t2,fontFamily:"inherit"}}>All</button>
        {CATS.map(c=><button key={c.key} onClick={()=>setFlt(c.key)} style={{padding:"5px 12px",borderRadius:99,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",border:flt===c.key?"2px solid "+c.c:"1px solid "+C.bdr,background:flt===c.key?c.bg:"transparent",color:flt===c.key?c.c:C.t2,whiteSpace:"nowrap"}}>{c.icon} {c.label}</button>)}
      </div>

      {filtSubs.map(t=><div key={t.id+"s"} style={{...card,borderLeft:"3px solid "+C.vio,marginBottom:6}}>
        <div style={{padding:"10px 14px",display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={()=>tglSub(t._pid,t.id)} style={{width:22,height:22,borderRadius:7,flexShrink:0,border:"2px solid "+C.vio,background:"transparent",cursor:"pointer"}}/>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.txt}}>{t.text}</div><span style={pl(C.vioBg,C.vioTx)}>{t._pt}</span>{t.due&&<span style={{fontSize:11,color:C.t3,marginLeft:6}}>{fmt(t.due)}</span>}</div>
          <a href={calUrl(t.text,t.due)} target="_blank" rel="noopener" style={{fontSize:11,color:C.grn,textDecoration:"none"}}>📅</a>
        </div>
      </div>)}

      {filtT.length===0&&filtSubs.length===0&&<div style={{textAlign:"center",padding:30,color:C.t3,fontSize:13}}>No tasks here</div>}

      {filtT.map(t=>{const c=gc(t.cat);const od=!t.done&&t.due<TD;
        return <div key={t.id} style={{...card,borderLeft:"3px solid "+(od?C.red:c.c),opacity:t.done?0.5:1,marginBottom:6}}>
          {editId===t.id?<div style={{padding:14}}>
            <input value={editF.text||""} onChange={e=>setEditF(p=>({...p,text:e.target.value}))} style={inp} autoFocus/>
            <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              {CATS.map(cc=><button key={cc.key} onClick={()=>setEditF(p=>({...p,cat:cc.key}))} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:editF.cat===cc.key?"2px solid "+cc.c:"1px solid "+C.bdr,background:editF.cat===cc.key?cc.bg:"transparent",color:editF.cat===cc.key?cc.c:C.t2}}>{cc.icon} {cc.label}</button>)}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input type="date" value={editF.due||""} onChange={e=>setEditF(p=>({...p,due:e.target.value}))} style={{...inp,flex:1}}/>
              <button onClick={()=>setEditF(p=>({...p,pri:p.pri==="urgent"?"normal":"urgent"}))} style={{padding:"10px 12px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",border:editF.pri==="urgent"?"2px solid "+C.red:"1px solid "+C.bdr,background:editF.pri==="urgent"?C.redBg:"transparent",color:editF.pri==="urgent"?C.redTx:C.t2}}>Urgent</button>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["","weekly","monthly"].map(r=><button key={r} onClick={()=>setEditF(p=>({...p,recur:r}))} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:editF.recur===r?"2px solid "+C.blu:"1px solid "+C.bdr,background:editF.recur===r?C.bluBg:"transparent",color:editF.recur===r?C.bluTx:C.t2}}>{r||"One-off"}</button>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>saveEdit(t.id)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:13,fontWeight:600}}>Save</button>
              <button onClick={()=>setEditId(null)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
            </div>
          </div>:
          <div style={{padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
            <button onClick={()=>tglDone(t.id)} style={{width:22,height:22,borderRadius:7,flexShrink:0,marginTop:1,border:t.done?"none":"2px solid "+c.c,background:t.done?c.c:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11}}>{t.done?"✓":""}</button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:C.txt,textDecoration:t.done?"line-through":"none"}}>{t.text}</div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                <span style={pl(c.bg,c.tx)}>{c.label}</span>
                {t.pri==="urgent"&&<span style={pl(C.redBg,C.redTx)}>Urgent</span>}
                {t.recur&&<span style={pl(C.bluBg,C.bluTx)}>{t.recur}</span>}
                {od&&<span style={{fontSize:11,fontWeight:600,color:C.red}}>Overdue</span>}
                {t.due!==TD&&!od&&<span style={{fontSize:11,color:C.t3}}>{fmt(t.due)}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <a href={calUrl(t.text,t.due)} target="_blank" rel="noopener" style={{width:26,height:26,borderRadius:8,background:C.grnBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,textDecoration:"none"}}>📅</a>
              <button onClick={()=>{setEditId(t.id);setEditF({text:t.text,cat:t.cat,due:t.due,pri:t.pri,recur:t.recur||""});}} style={{width:26,height:26,borderRadius:8,border:"none",background:C.bdr,cursor:"pointer",fontSize:11,color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>✏</button>
              <button onClick={()=>delT(t.id)} style={{width:26,height:26,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",fontSize:11,color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>}
        </div>;
      })}

      {!addT&&<div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setAddT(true)} style={{flex:1,padding:12,borderRadius:12,border:"2px dashed "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>+ New task</button>
        <button onClick={()=>setTmpl(!tmpl)} style={{padding:"12px 16px",borderRadius:12,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>Templates</button>
      </div>}
      {tmpl&&<div style={{...card,padding:14,marginTop:8}}><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{TMPLS.map((t,i)=><button key={i} onClick={()=>{upd(d=>({tasks:[{id:uid(),text:t,cat:"property",due:TD,pri:"normal",done:false,created:TD,recur:""},...d.tasks]}));setTmpl(false);}} style={{padding:"5px 10px",borderRadius:99,border:"1px solid "+C.grn+"40",background:C.grnBg,color:C.grnTx,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ {t}</button>)}</div></div>}

      {addT&&<div style={{...card,padding:14,marginTop:8}}>
        <input value={tf.text} onChange={e=>setTf(f=>({...f,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doAddT()} placeholder="What needs doing?" style={{...inp,fontSize:14}} autoFocus/>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {CATS.map(c=><button key={c.key} onClick={()=>setTf(f=>({...f,cat:c.key}))} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:tf.cat===c.key?"2px solid "+c.c:"1px solid "+C.bdr,background:tf.cat===c.key?c.bg:"transparent",color:tf.cat===c.key?c.c:C.t2}}>{c.icon} {c.label}</button>)}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input type="date" value={tf.due} onChange={e=>setTf(f=>({...f,due:e.target.value}))} style={{...inp,flex:1}}/>
          <button onClick={()=>setTf(f=>({...f,pri:f.pri==="urgent"?"normal":"urgent"}))} style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",border:tf.pri==="urgent"?"2px solid "+C.red:"1px solid "+C.bdr,background:tf.pri==="urgent"?C.redBg:"transparent",color:tf.pri==="urgent"?C.redTx:C.t2}}>Urgent</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["","weekly","monthly"].map(r=><button key={r} onClick={()=>setTf(f=>({...f,recur:r}))} style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:tf.recur===r?"2px solid "+C.blu:"1px solid "+C.bdr,background:tf.recur===r?C.bluBg:"transparent",color:tf.recur===r?C.bluTx:C.t2}}>{r||"One-off"}</button>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddT} style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:14,fontWeight:600}}>Add task</button>
          <button onClick={()=>setAddT(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,color:C.t2}}>Cancel</button>
        </div>
      </div>}
    </>}

    {/* ══════ PROJECTS & GOALS ══════ */}
    {tab==="proj"&&<>
      <div style={{fontSize:16,fontWeight:700,color:C.txt,marginBottom:10}}>Projects</div>
      {projects.map(p=>{const d=p.subtasks.filter(s=>s.done).length,t=p.subtasks.length,pct=t>0?Math.round((d/t)*100):0;
        return <div key={p.id} style={{...card,opacity:p.status==="done"?0.5:1}}>
          {editPid===p.id?<div style={{padding:14}}>
            <input value={editPf.title||""} onChange={e=>setEditPf(f=>({...f,title:e.target.value}))} style={inp}/>
            <input type="date" value={editPf.deadline||""} onChange={e=>setEditPf(f=>({...f,deadline:e.target.value}))} style={inp}/>
            <input value={editPf.notes||""} onChange={e=>setEditPf(f=>({...f,notes:e.target.value}))} placeholder="Notes" style={inp}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{updP(p.id,editPf);setEditPid(null);}} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:13,fontWeight:600}}>Save</button>
              <button onClick={()=>setEditPid(null)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
            </div>
          </div>:<>
            <div style={{padding:"12px 16px",borderBottom:"1px solid "+C.bdr}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{p.title}</div>
                  {p.deadline&&<div style={{fontSize:11,color:C.t2,marginTop:2}}>Due {fmt(p.deadline)}</div>}
                  {p.notes&&<div style={{fontSize:12,color:C.t2,marginTop:2}}>{p.notes}</div>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <select value={p.status} onChange={e=>updP(p.id,{status:e.target.value})} style={{padding:"4px 8px",borderRadius:8,border:"1px solid "+C.bdr,background:C.card,color:C.txt,fontSize:11,fontWeight:600,outline:"none"}}><option value="active">Active</option><option value="on-hold">On hold</option><option value="done">Done</option></select>
                  <button onClick={()=>{setEditPid(p.id);setEditPf({title:p.title,deadline:p.deadline,notes:p.notes});}} style={{width:26,height:26,borderRadius:8,border:"none",background:C.bdr,cursor:"pointer",fontSize:11,color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>✏</button>
                  <button onClick={()=>delP(p.id)} style={{width:26,height:26,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",fontSize:11,color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,background:C.bdr,borderRadius:99,height:7,overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,background:pct===100?C.grn:C.vio,width:pct+"%",transition:"width 0.3s"}}/></div>
                <span style={{fontSize:12,fontWeight:600,color:pct===100?C.grn:C.vio}}>{pct}%</span>
              </div>
            </div>
            <div style={{padding:"4px 0"}}>
              {p.subtasks.map(st=><div key={st.id} style={{padding:"8px 16px",display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={()=>tglSub(p.id,st.id)} style={{width:20,height:20,borderRadius:6,flexShrink:0,border:st.done?"none":"2px solid "+C.vio,background:st.done?C.grn:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>{st.done?"✓":""}</button>
                <div style={{flex:1,fontSize:13,color:C.txt,textDecoration:st.done?"line-through":"none"}}>{st.text}</div>
                {st.due&&<span style={{fontSize:10,color:C.t3}}>{fmt(st.due)}</span>}
                {st.due&&!st.done&&<a href={calUrl(st.text,st.due)} target="_blank" rel="noopener" style={{fontSize:10,color:C.grn,textDecoration:"none"}}>📅</a>}
                <button onClick={()=>delSub(p.id,st.id)} style={{width:20,height:20,borderRadius:6,border:"none",background:C.redBg,cursor:"pointer",fontSize:10,color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>)}
              {addSub===p.id?<div style={{padding:"8px 16px",display:"flex",gap:6,flexWrap:"wrap"}}>
                <input value={subF.text} onChange={e=>setSubF(f=>({...f,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doAddSub(p.id)} placeholder="Subtask..." style={{...inp,flex:1,marginBottom:0,minWidth:120}} autoFocus/>
                <input type="date" value={subF.due} onChange={e=>setSubF(f=>({...f,due:e.target.value}))} style={{...inp,width:130,marginBottom:0}}/>
                <button onClick={()=>doAddSub(p.id)} style={{padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",background:C.vio,color:"#fff",fontSize:12,fontWeight:600}}>Add</button>
                <button onClick={()=>setAddSub(null)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:12}}>×</button>
              </div>:<div style={{padding:"6px 16px 10px"}}><button onClick={()=>{setAddSub(p.id);setSubF({text:"",due:""});}} style={{fontSize:12,color:C.vio,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Add subtask</button></div>}
            </div>
          </>}
        </div>;
      })}

      {addP?<div style={{...card,padding:14}}>
        <div style={{fontSize:14,fontWeight:700,color:C.txt,marginBottom:10}}>New project</div>
        <input value={pf.title} onChange={e=>setPf(f=>({...f,title:e.target.value}))} placeholder="Project title" style={inp} autoFocus/>
        <input type="date" value={pf.deadline} onChange={e=>setPf(f=>({...f,deadline:e.target.value}))} style={inp}/>
        <input value={pf.notes} onChange={e=>setPf(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)" style={inp}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddP} style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:"pointer",background:C.vio,color:"#fff",fontSize:14,fontWeight:600}}>Create</button>
          <button onClick={()=>setAddP(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,color:C.t2}}>Cancel</button>
        </div>
      </div>:<button onClick={()=>setAddP(true)} style={{width:"100%",padding:12,borderRadius:12,border:"2px dashed "+C.vio+"60",cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.vio,fontFamily:"inherit",marginBottom:16}}>+ New project</button>}

      <div style={{fontSize:16,fontWeight:700,color:C.txt,marginTop:20,marginBottom:10}}>Goals</div>
      {goals.map(g=>{const sm={"In progress":{bg:C.vioBg,c:C.vioTx},"Almost done":{bg:C.grnBg,c:C.grnTx},"On hold":{bg:C.ambBg,c:C.ambTx},"Done":{bg:C.grnBg,c:C.grnTx}};const sc=sm[g.status]||sm["In progress"];
        return <div key={g.id} style={{...card,opacity:g.status==="Done"?0.5:1}}>
          <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:C.txt,textDecoration:g.status==="Done"?"line-through":"none"}}>{g.text}</div>{g.deadline&&<div style={{fontSize:11,color:C.t2,marginTop:3}}>Deadline: {fmt(g.deadline)}</div>}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              <select value={g.status} onChange={e=>updG(g.id,{status:e.target.value})} style={{padding:"4px 8px",borderRadius:8,border:"1px solid "+sc.c+"40",background:sc.bg,color:sc.c,fontSize:11,fontWeight:600,outline:"none",cursor:"pointer"}}><option value="In progress">In progress</option><option value="Almost done">Almost done</option><option value="On hold">On hold</option><option value="Done">Done</option></select>
              <button onClick={()=>delG(g.id)} style={{width:24,height:24,borderRadius:8,border:"none",background:C.redBg,cursor:"pointer",fontSize:11,color:C.redTx,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
        </div>;
      })}
      {addG?<div style={{...card,padding:14}}>
        <input value={gf.text} onChange={e=>setGf(f=>({...f,text:e.target.value}))} placeholder="Goal (e.g. Buy 2 more properties)" style={inp} autoFocus/>
        <input type="date" value={gf.deadline} onChange={e=>setGf(f=>({...f,deadline:e.target.value}))} style={inp}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doAddG} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:13,fontWeight:600}}>Add goal</button>
          <button onClick={()=>setAddG(false)} style={{padding:"10px 14px",borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
        </div>
      </div>:<button onClick={()=>setAddG(true)} style={{width:"100%",padding:12,borderRadius:12,border:"2px dashed "+C.bdr,cursor:"pointer",background:"transparent",fontSize:13,fontWeight:600,color:C.t2,fontFamily:"inherit"}}>+ New goal</button>}
    </>}

    {/* ══════ ACTIVITY ══════ */}
    {tab==="activity"&&<>
      {/* Date selector */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14}}>
        <button onClick={()=>setActDate(dateShift(actDate,-1))} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.txt}}>{actDate===TD?"Today":fmtFull(actDate)}</div>
          {actDate!==TD&&<button onClick={()=>setActDate(TD)} style={{fontSize:11,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",marginTop:2}}>Back to today</button>}
        </div>
        <button onClick={()=>{if(actDate<TD)setActDate(dateShift(actDate,1));}} style={{width:32,height:32,borderRadius:10,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.txt,opacity:actDate>=TD?0.3:1}}>→</button>
      </div>

      {/* Activity toggles with notes */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Activities</div><span style={pl(customActs.filter(a=>isA(a)).length===customActs.length?C.grnBg:C.ambBg,customActs.filter(a=>isA(a)).length===customActs.length?C.grnTx:C.ambTx)}>{customActs.filter(a=>isA(a)).length}/{customActs.length}</span></div>
        <div style={{padding:"14px 16px"}}>
          {customActs.map(name=>{const done=isA(name);const st=actStyle(name);const note=getActNote(name);const isEditing=editAct===name+"-"+actDate;const isRenaming=editAct==="rename-"+name;
            return <div key={name} style={{marginBottom:10}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>tgl(name)} style={{flex:1,padding:"12px 10px",borderRadius:12,cursor:"pointer",fontFamily:"'DM Sans',system-ui",textAlign:"left",fontSize:13,fontWeight:600,
                  border:done?"2px solid "+st.color:"1px solid "+C.bdr,background:done?st.bg:"transparent",color:done?st.tx:C.t3,display:"flex",justifyContent:"space-between",alignItems:"center",
                }}><span>{name}</span>{done&&<span style={{color:st.color}}>✓</span>}</button>
                <button onClick={()=>{if(isRenaming){setEditAct(null);}else{setEditAct("rename-"+name);setActNoteIn(name);}}} style={{width:28,height:28,borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:C.card,fontSize:10,color:C.t2,display:"flex",alignItems:"center",justifyContent:"center"}}>✏</button>
                {done&&<button onClick={()=>{if(isEditing){setEditAct(null);}else{setEditAct(name+"-"+actDate);setActNoteIn(note);}}} style={{width:28,height:28,borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:note?st.bg:C.card,fontSize:10,color:note?st.tx:C.t3,display:"flex",alignItems:"center",justifyContent:"center"}}>{note?"📝":"+"}</button>}
              </div>
              {isRenaming&&<div style={{display:"flex",gap:8,marginTop:6}}>
                <input value={actNoteIn} onChange={e=>setActNoteIn(e.target.value)} placeholder="New name" style={{...inp,flex:1,marginBottom:0,fontSize:12}} autoFocus/>
                <button onClick={()=>{
                  const newName=actNoteIn.trim();
                  if(newName&&newName!==name){
                    upd(d=>{
                      const newActs={...d.acts};const newNotes={...d.actNotes};
                      Object.keys(newActs).forEach(k=>{if(k.startsWith(name+"-")){newActs[k.replace(name+"-",newName+"-")]=newActs[k];delete newActs[k];}});
                      Object.keys(newNotes).forEach(k=>{if(k.startsWith(name+"-")){newNotes[k.replace(name+"-",newName+"-")]=newNotes[k];delete newNotes[k];}});
                      return{customActs:d.customActs.map(a=>a===name?newName:a),acts:newActs,actNotes:newNotes};
                    });
                  }
                  setEditAct(null);
                }} style={{padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:12,fontWeight:600}}>Save</button>
                <button onClick={()=>{upd(d=>({customActs:d.customActs.filter(a=>a!==name)}));setEditAct(null);}} style={{padding:"8px 10px",borderRadius:8,border:"none",cursor:"pointer",background:C.redBg,color:C.redTx,fontSize:12,fontWeight:600}}>Delete</button>
              </div>}
              {isEditing&&<div style={{display:"flex",gap:8,marginTop:6}}>
                <input value={actNoteIn} onChange={e=>setActNoteIn(e.target.value)} placeholder={"Detail: e.g. "+name+" — trained back, 45 mins"} style={{...inp,flex:1,marginBottom:0,fontSize:12}} autoFocus/>
                <button onClick={()=>{setActNote(name,actNoteIn);setEditAct(null);}} style={{padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:12,fontWeight:600}}>Save</button>
              </div>}
              {!isEditing&&!isRenaming&&note&&<div style={{fontSize:11,color:st.tx,marginTop:4,paddingLeft:4}}>{note}</div>}
            </div>;
          })}
        </div>
        <div style={{padding:"4px 16px 12px",borderTop:"1px solid "+C.bdr}}>
          {addAct?<div style={{display:"flex",gap:8}}>
            <input value={actN} onChange={e=>setActN(e.target.value)} placeholder="Activity name" style={{...inp,flex:1,marginBottom:0}} autoFocus/>
            <button onClick={()=>{if(actN.trim()){upd(d=>({customActs:[...d.customActs,actN.trim()]}));setActN("");setAddAct(false);}}} style={{padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:12,fontWeight:600}}>Add</button>
          </div>:
            <button onClick={()=>setAddAct(true)} style={{fontSize:12,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Add activity</button>
          }
        </div>
      </div>

      {/* Two week view */}
      <div style={card}>
        <div style={cHead}><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Last 2 weeks</div><span style={pl(C.grnBg,C.grnTx)}>{wkRate}% this wk</span></div>
        {twData.map((d,i)=>{
          const hasNotes=Object.keys(d.notes).length>0;
          return <div key={d.date} style={{borderBottom:i<13?"1px solid "+C.bdr:"none",opacity:d.future?0.3:1}}>
            <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setActDate(d.date)}>
              <div style={{width:36,textAlign:"center"}}>
                <div style={{fontSize:10,fontWeight:d.today?700:500,color:d.today?C.txt:d.isThisWeek?C.t2:C.t3}}>{d.day}</div>
                <div style={{fontSize:14,fontWeight:700,color:d.today?C.txt:d.isThisWeek?C.t2:C.t3}}>{d.num}</div>
              </div>
              <div style={{flex:1,display:"flex",gap:4,flexWrap:"wrap"}}>
                {d.done.length>0?d.done.map(a=>{const st=actStyle(a);return <span key={a} style={pl(st.bg,st.tx)}>{a}</span>;}):
                <span style={{fontSize:11,color:C.t3}}>{d.future?"—":"Rest day"}</span>}
              </div>
            </div>
            {hasNotes&&<div style={{padding:"0 16px 8px 62px"}}>
              {Object.entries(d.notes).map(([act,note])=><div key={act} style={{fontSize:11,color:C.t2}}><span style={{fontWeight:600}}>{act}:</span> {note}</div>)}
            </div>}
          </div>;
        })}
      </div>

      {/* Weight */}
      <div style={card}>
        <div style={cHead}><div><div style={{fontSize:15,fontWeight:700,color:C.txt}}>Weight</div><div style={{fontSize:12,color:C.t2,marginTop:1}}>{body.length>0?body[0].weight+"kg — "+fmt(body[0].date):"Start tracking"}</div></div></div>
        {body.length>=2&&<div style={{padding:"8px 16px"}}><WChart data={body}/></div>}
        {addB?<div style={{padding:"8px 16px 14px",display:"flex",gap:8,borderTop:body.length>=2?"1px solid "+C.bdr:"none"}}>
          <input value={bw} onChange={e=>setBw(e.target.value)} placeholder="kg" type="number" step="0.1" style={{...inp,width:90,marginBottom:0}} autoFocus/>
          <button onClick={doAddB} style={{padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",background:C.grn,color:"#fff",fontSize:12,fontWeight:600}}>Save</button>
          <button onClick={()=>setAddB(false)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid "+C.bdr,cursor:"pointer",background:"transparent",color:C.t2,fontSize:12}}>×</button>
        </div>:<div style={{padding:"8px 16px 14px",borderTop:body.length>=2?"1px solid "+C.bdr:"none"}}><button onClick={()=>setAddB(true)} style={{fontSize:12,color:C.grn,fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>+ Log weigh-in</button></div>}
      </div>

      <button onClick={genBodyAI} disabled={aiLoad} style={{width:"100%",padding:14,borderRadius:12,border:"none",cursor:"pointer",background:aiLoad?C.bdr:C.slate,color:aiLoad?C.t3:"#fff",fontSize:14,fontWeight:600,fontFamily:"inherit",marginBottom:10}}>{aiLoad?"Analysing...":"AI body & fitness review"}</button>
      {aiRes&&<div style={{...card,padding:14}}><div style={{fontSize:13,lineHeight:1.8,color:C.txt,whiteSpace:"pre-wrap"}}>{aiRes}</div></div>}
    </>}

    </div>
    <div style={{textAlign:"center",padding:16,fontSize:11,color:C.t3}}>Ash's Daily HQ</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
